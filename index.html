<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Studio Pro | Ultimate Edition</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

:root {
  --bg: #f1f5f9; --card: #ffffff; --primary: #4f46e5; --primary-hover: #4338ca;
  --primary-soft: #eef2ff; --text-main: #0f172a; --text-sub: #64748b;
  --border: #e2e8f0; --radius-lg: 20px; --radius-md: 12px;
}

* { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
body { margin: 0; background: var(--bg); color: var(--text-main); padding: 40px 20px; }

.container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 40px; }
.main-header { grid-column: 1 / -1; margin-bottom: 20px; }
.main-header h1 { font-size: 34px; font-weight: 900; margin: 0; letter-spacing: -0.05em; }

.card { background: var(--card); border-radius: var(--radius-lg); padding: 40px; border: 1px solid var(--border); }
.section-title { font-size: 20px; font-weight: 800; margin-bottom: 30px; display: flex; justify-content: space-between; }
.badge { font-size: 12px; padding: 4px 12px; border-radius: 99px; background: var(--primary-soft); color: var(--primary); font-weight: 700; }

.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
.field { display: flex; flex-direction: column; gap: 10px; }

input, select, textarea { 
  width: 100%; padding: 14px 18px; border: 1.5px solid var(--border); border-radius: var(--radius-md); 
  font-size: 15px;
}

.result-box { 
  background: #0f172a; color: #e2e8f0; padding: 30px; border-radius: var(--radius-md); 
  min-height: 350px; font-size: 14px; white-space: pre-wrap; margin-top: 15px;
  font-family: 'Consolas', monospace;
}

.btn-group { display: flex; gap: 16px; margin-top: 32px; }
.btn-main { background: var(--primary); color: white; flex: 2; padding: 18px; border: none; border-radius: var(--radius-md); cursor: pointer; }
.btn-sub { background: #f8fafc; flex: 1; padding: 18px; border: 1px solid var(--border); border-radius: var(--radius-md); cursor: pointer; }

.filter-box { display: grid; grid-template-columns: 1fr 1.5fr; gap: 12px; margin-bottom: 24px; }
.archive-card { padding: 20px; border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 12px; }
.card-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; }
.action-btn { padding: 10px; font-size: 12px; cursor: pointer; }

</style>
</head>
<body>

<div class="container">
  <div class="main-header">
    <h1>Prompt Studio Pro</h1>
  </div>

  <div class="card">
    <div class="section-title">Editor <span class="badge">NEW</span></div>

    <input id="titleIn" placeholder="제목">
    <select id="aiSel"></select>
    <select id="useSel"></select>
    <input id="toneIn" placeholder="톤">
    <textarea id="detailIn" rows="6" placeholder="요청 내용"></textarea>

    <div class="result-box" id="resultOut"></div>
  </div>

  <div class="card">
    <div class="section-title">Archive</div>
    <div id="listBox"></div>
  </div>
</div>

<script>
let savedData = [
  {
    id: 1,
    title: "프론트엔드 코드 리팩토링",
    ai: "GPT-4o",
    use: "코드 최적화",
    tone: "전문적이고 명확한",
    detail: "React 코드 개선 및 최적화"
  },
  {
    id: 2,
    title: "UX 블로그 글 작성",
    ai: "Claude 3.5",
    use: "콘텐츠 제작",
    tone: "친근하지만 전문적인",
    detail: "UX 개념 설명 글 작성"
  },
  {
    id: 3,
    title: "웹 서비스 기획",
    ai: "Gemini 1.5 Pro",
    use: "전략 기획",
    tone: "분석적",
    detail: "대학생 대상 서비스 기획"
  },
  {
    id: 4,
    title: "프롬프트 개선",
    ai: "GPT-4o",
    use: "전략 기획",
    tone: "직설적",
    detail: "프롬프트 개선"
  },
  {
    id: 5,
    title: "UI 개선",
    ai: "Claude 3.5",
    use: "전략 기획",
    tone: "컨설턴트 스타일",
    detail: "웹 UI 분석 및 개선"
  }
];

let aiOptions = ["GPT-4o","Claude 3.5","Gemini 1.5 Pro"];
let useOptions = ["코드 최적화","전략 기획","콘텐츠 제작"];

function init(){
  renderSelect('aiSel', aiOptions);
  renderSelect('useSel', useOptions);
  renderList();
  updateResult();
}

function renderSelect(id, arr){
  document.getElementById(id).innerHTML = arr.map(v=>`<option>${v}</option>`).join('');
}

function renderList(){
  document.getElementById('listBox').innerHTML = savedData.map(item=>`
    <div class="archive-card">
      <strong>${item.title}</strong>
      <div>${item.ai} / ${item.use}</div>
      <div class="card-actions">
        <button onclick="loadItem(${item.id})">불러오기</button>
      </div>
    </div>
  `).join('');
}

function loadItem(id){
  const item = savedData.find(i=>i.id===id);
  document.getElementById('titleIn').value=item.title;
  document.getElementById('aiSel').value=item.ai;
  document.getElementById('useSel').value=item.use;
  document.getElementById('toneIn').value=item.tone;
  document.getElementById('detailIn').value=item.detail;
  updateResult();
}

function updateResult(){
  const t=document.getElementById('titleIn').value;
  const d=document.getElementById('detailIn').value;
  document.getElementById('resultOut').textContent=`${t}\n\n${d}`;
}

['titleIn','detailIn'].forEach(id=>{
  document.getElementById(id).oninput=updateResult;
});

init();
</script>

</body>
</html>

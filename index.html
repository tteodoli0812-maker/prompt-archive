<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Archive</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Pretendard, sans-serif;
  background:#f9fafb;
  color:#111;
}

.container{
  max-width:900px;
  margin:0 auto;
  padding:40px 20px;
}

/* 헤더 */
.header{
  margin-bottom:30px;
}

.header h1{
  margin:0;
  font-size:28px;
}

.header p{
  margin-top:6px;
  color:#6b7280;
  font-size:14px;
}

/* 카드 */
.card{
  background:white;
  border-radius:14px;
  padding:20px;
  margin-bottom:16px;
  border:1px solid #e5e7eb;
}

.section-title{
  font-size:16px;
  margin-bottom:12px;
  font-weight:600;
}

input, textarea, select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #d1d5db;
  font-size:14px;
}

textarea{
  height:120px;
}

.buttons{
  display:flex;
  gap:8px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
}

.primary{background:#2563eb;color:white}
.gray{background:#e5e7eb}
.green{background:#16a34a;color:white}

.result{
  background:#111827;
  color:white;
  padding:12px;
  border-radius:8px;
  font-size:13px;
  white-space:pre-wrap;
}

/* 리스트 */
.list-item{
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.list-item:hover{
  background:#f3f4f6;
}

.category{
  font-size:11px;
  color:#6b7280;
}

</style>
</head>

<body>

<div class="container">

  <!-- 헤더 -->
  <div class="header">
    <h1>Prompt Archive</h1>
    <p>프롬프트를 만들고, 정리하고, 다시 사용하는 공간</p>
  </div>

  <!-- 만들기 -->
  <div class="card">
    <div class="section-title">1. 프롬프트 만들기</div>

    <input id="title" placeholder="제목">

    <select id="category">
      <option>글쓰기</option>
      <option>기획</option>
      <option>코딩</option>
    </select>

    <textarea id="text" placeholder="프롬프트 입력"></textarea>

    <div class="buttons">
      <button class="primary" id="improve">정리</button>
      <button class="green" id="save">저장</button>
      <button class="gray" id="copy">복사</button>
    </div>

    <div class="result" id="result"></div>
  </div>

  <!-- 보관함 -->
  <div class="card">
    <div class="section-title">2. 저장된 프롬프트</div>

    <div id="list"></div>
  </div>

</div>

<script>

let data=[
  {title:'발표문',category:'글쓰기',text:'발표문 써줘'},
  {title:'기획',category:'기획',text:'기획 정리해줘'}
]

let current=null

const listEl=document.getElementById('list')
const titleEl=document.getElementById('title')
const textEl=document.getElementById('text')
const categoryEl=document.getElementById('category')
const resultEl=document.getElementById('result')

function render(){
  listEl.innerHTML=''

  data.forEach((item,i)=>{
    const div=document.createElement('div')
    div.className='list-item'

    div.innerHTML=`
      <strong>${item.title}</strong><br>
      <span class="category">${item.category}</span>
    `

    div.onclick=()=>{
      current=i
      titleEl.value=item.title
      textEl.value=item.text
      categoryEl.value=item.category
    }

    listEl.appendChild(div)
  })
}

function improve(text){
  return `더 구체적으로 작성:\n${text}`
}


document.getElementById('improve').onclick=()=>{
  resultEl.textContent=improve(textEl.value)
}


document.getElementById('save').onclick=()=>{
  const item={
    title:titleEl.value,
    text:textEl.value,
    category:categoryEl.value
  }

  if(current!==null){
    data[current]=item
  }else{
    data.unshift(item)
  }

  current=null
  titleEl.value=''
  textEl.value=''
  render()
}


document.getElementById('copy').onclick=()=>{
  navigator.clipboard.writeText(textEl.value)
}

render()

</script>

</body>
</html>

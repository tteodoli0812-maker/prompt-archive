<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio Pro - Engineering Tool</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

        :root {
            --bg: #f1f5f9;
            --card: #ffffff;
            --primary: #4f46e5;
            --primary-soft: #eef2ff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --radius-lg: 20px;
            --radius-md: 12px;
        }

        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text-main); padding: 40px 20px; min-height: 100vh; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
        }

        .main-header { grid-column: 1 / -1; margin-bottom: 20px; }
        .main-header h1 { font-size: 34px; font-weight: 900; margin: 0; letter-spacing: -0.05em; color: var(--text-main); }
        .main-header p { margin: 8px 0 0; color: var(--text-sub); }

        .card {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            height: fit-content;
        }

        .section-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .badge {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 99px;
            background: var(--primary-soft);
            color: var(--primary);
            font-weight: 700;
            border: 1px solid #c7d2fe;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        label { font-size: 14px; font-weight: 700; color: #475569; }

        .flex-input { display: flex; gap: 8px; }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 15px;
            outline: none;
            transition: 0.2s;
            background: white;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .add-inline-btn {
            padding: 0 14px;
            background: #fff;
            color: var(--primary);
            border: 1.5px solid var(--primary);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
        }

        .add-inline-btn:hover { background: var(--primary-soft); }

        .chip-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }

        .chip {
            padding: 6px 14px;
            background: #f8fafc;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            color: var(--text-sub);
            transition: 0.2s;
        }

        .chip:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-soft); }

        .result-box {
            background: #0f172a;
            color: #e2e8f0;
            padding: 25px;
            border-radius: var(--radius-md);
            min-height: 300px;
            font-size: 14px;
            white-space: pre-wrap;
            margin-top: 10px;
            font-family: 'Consolas', 'Monaco', monospace;
            line-height: 1.6;
            border: 1px solid #1e293b;
            overflow-x: auto;
        }

        .btn-group { display: flex; gap: 12px; margin-top: 25px; }

        .btn-main {
            background: var(--primary);
            color: white;
            flex: 2;
            padding: 16px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 800;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        .btn-main:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-sub {
            background: #f8fafc;
            color: var(--text-sub);
            flex: 1;
            padding: 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-weight: 700;
            cursor: pointer;
        }

        .filter-box {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .list-scroll {
            max-height: 700px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* 스크롤바 디자인 */
        .list-scroll::-webkit-scrollbar { width: 6px; }
        .list-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .archive-card {
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: white;
            margin-bottom: 16px;
            transition: 0.3s;
        }

        .archive-card:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }

        .card-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 15px;
        }

        .action-btn {
            padding: 8px 0;
            font-size: 11px;
            border-radius: 8px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            text-align: center;
        }

        .action-load { background: var(--primary-soft); color: var(--primary); }
        .action-del { background: #fee2e2; color: #b91c1c; }

        /* 모달 스타일 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: #1e293b;
            border-radius: 20px;
            width: 400px;
            max-width: 90%;
            overflow: hidden;
            color: white;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .modal-header { background: #0f172a; padding: 20px; font-weight: 800; border-bottom: 1px solid #334155; }
        .modal-body { padding: 25px; }

        .modal-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 10px;
            background: #0f172a;
            color: white;
            margin-top: 10px;
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 99px;
            display: none;
            z-index: 3000;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            font-weight: 600;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { bottom: 20px; opacity: 0; }
            to { bottom: 40px; opacity: 1; }
        }

        @media (max-width: 980px) {
            .container { grid-template-columns: 1fr; }
            .input-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="modal-overlay" id="categoryModal">
        <div class="modal">
            <div class="modal-header">새 항목 추가</div>
            <div class="modal-body">
                <p id="modalDesc" style="margin:0; color:#94a3b8; font-size:14px;">항목을 입력하세요</p>
                <input type="text" id="modalInput" class="modal-input" placeholder="여기에 입력..." />
                <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:24px;">
                    <button class="btn-sub" style="padding:10px 20px; flex:none;" onclick="closeModal()">취소</button>
                    <button class="btn-main" style="flex:none; padding:10px 25px" id="modalConfirmBtn">추가</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="main-header">
            <h1>Prompt Studio Pro</h1>
            <p>Professional Prompt Engineering Tool</p>
        </div>

        <div class="main-side">
            <div class="card">
                <div class="section-title">Editor <span id="modeStatus" class="badge">NEW</span></div>

                <div class="input-row">
                    <div class="field">
                        <label>Project Title</label>
                        <input type="text" id="titleIn" placeholder="작업의 제목을 입력하세요" />
                    </div>
                    <div class="field">
                        <label>AI Model</label>
                        <div class="flex-input">
                            <select id="aiSel"></select>
                            <button class="add-inline-btn" onclick="openModal('aiSel')">+</button>
                        </div>
                    </div>
                </div>

                <div class="input-row">
                    <div class="field">
                        <label>Category</label>
                        <div class="flex-input">
                            <select id="useSel"></select>
                            <button class="add-inline-btn" onclick="openModal('useSel')">+</button>
                        </div>
                    </div>
                    <div class="field">
                        <label>Tone & Manner</label>
                        <input type="text" id="toneIn" placeholder="전문적인, 직설적인 등" />
                    </div>
                </div>

                <div class="field">
                    <label>Requirements & Constraints (Chips)</label>
                    <div class="flex-input">
                        <input type="text" id="customChipIn" placeholder="제약 조건 키워드 추가" />
                        <button class="add-inline-btn" onclick="addChip()">Add</button>
                    </div>
                    <div class="chip-container" id="chipBox"></div>
                    <textarea id="detailIn" rows="4" style="margin-top:10px;" placeholder="구체적인 요청 사항을 적어주세요."></textarea>
                </div>

                <label style="margin-top:15px; display:block;">Engineered Prompt Preview</label>
                <div class="result-box" id="resultOut"></div>

                <div class="btn-group">
                    <button class="btn-main" id="saveBtn">Save to Archive</button>
                    <button class="btn-sub" id="resetBtn">Reset Editor</button>
                </div>
            </div>
        </div>

        <div class="archive-side">
            <div class="card">
                <div class="section-title">Archive Storage</div>
                <div class="filter-box">
                    <select id="categoryFilter">
                        <option value="all">전체 카테고리</option>
                    </select>
                    <input type="text" id="searchIn" placeholder="검색어를 입력하세요..." />
                </div>
                <div class="list-scroll" id="listBox"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">완료되었습니다!</div>

    <script>
        // 초기 기본 데이터 설정
        let savedData = [];
        let aiOptions = ["GPT-4o", "Claude 3.5 Sonnet", "Gemini 1.5 Pro"];
        let useOptions = ["코드 최적화", "전략 기획", "콘텐츠 제작", "데이터 분석"];
        let chips = ["불필요한 서론 생략", "단계별 가이드 제공", "JSON 형식 출력", "한국어로 답변"];
        let editId = null;
        let targetSelectId = null;

        const STORAGE_KEYS = {
            savedData: "promptStudio_savedData_v1",
            aiOptions: "promptStudio_aiOptions_v1",
            useOptions: "promptStudio_useOptions_v1",
            chips: "promptStudio_chips_v1"
        };

        // 로컬 스토리지 로드
        function loadStorage() {
            try {
                const storedSavedData = localStorage.getItem(STORAGE_KEYS.savedData);
                const storedAiOptions = localStorage.getItem(STORAGE_KEYS.aiOptions);
                const storedUseOptions = localStorage.getItem(STORAGE_KEYS.useOptions);
                const storedChips = localStorage.getItem(STORAGE_KEYS.chips);

                if (storedSavedData) savedData = JSON.parse(storedSavedData);
                if (storedAiOptions) aiOptions = JSON.parse(storedAiOptions);
                if (storedUseOptions) useOptions = JSON.parse(storedUseOptions);
                if (storedChips) chips = JSON.parse(storedChips);
            } catch (e) {
                console.error("Storage Load Error:", e);
            }
        }

        // 로컬 스토리지 저장
        function saveStorage() {
            try {
                localStorage.setItem(STORAGE_KEYS.savedData, JSON.stringify(savedData));
                localStorage.setItem(STORAGE_KEYS.aiOptions, JSON.stringify(aiOptions));
                localStorage.setItem(STORAGE_KEYS.useOptions, JSON.stringify(useOptions));
                localStorage.setItem(STORAGE_KEYS.chips, JSON.stringify(chips));
            } catch (e) {
                console.error("Storage Save Error:", e);
            }
        }

        // 초기화 함수
        function init() {
            loadStorage();
            renderSelect('aiSel', aiOptions);
            renderSelect('useSel', useOptions);
            renderFilterOptions();
            renderChips();
            renderList();
            updateResult(); // 페이지 로드 즉시 프롬프트 생성
        }

        // 프롬프트 생성 엔진
        function updateResult() {
            const title = document.getElementById('titleIn').value.trim() || "새로운 작업";
            const ai = document.getElementById('aiSel').value || "AI Model";
            const use = document.getElementById('useSel').value || "General";
            const tone = document.getElementById('toneIn').value.trim() || "전문적이고 명확한 톤";
            const detail = document.getElementById('detailIn').value.trim() || "상세 요청 사항 없음";

            const prompt = `[SYSTEM CONTEXT]
당신은 "${use}" 분야에 특화된 숙련된 전문가입니다.
사용자의 요청을 분석하고, ${ai}의 강점을 최대한 활용해 가장 실용적이고 완성도 높은 결과물을 생성하세요.

[MISSION]
작업명: ${title}

[TONE & STYLE]
- 말투/분위기: ${tone}
- 설명은 명확하고 간결하게 작성하며, 필요 시 항목화하여 제시합니다.

[REQUIREMENTS]
${detail}

[OUTPUT RULES]
1. 결과물은 바로 실사용 가능해야 합니다.
2. 불필요한 서론 및 장황한 설명은 최소화합니다.
3. 요청 목적에 맞게 구조화된 형식으로 작성합니다.

[FINAL INSTRUCTION]
위 조건을 모두 반영하여 최적의 결과물을 작성해 주세요.`;

            document.getElementById('resultOut').textContent = prompt;
        }

        // 리스트 렌더링
        function renderList() {
            const keyword = document.getElementById('searchIn').value.toLowerCase().trim();
            const filter = document.getElementById('categoryFilter').value;
            const box = document.getElementById('listBox');

            const filtered = savedData.filter(item => {
                const matchKeyword = !keyword || 
                    (item.title || '').toLowerCase().includes(keyword) || 
                    (item.detail || '').toLowerCase().includes(keyword);
                const matchFilter = (filter === 'all' || item.use === filter);
                return matchKeyword && matchFilter;
            });

            if (filtered.length === 0) {
                box.innerHTML = `<div style="text-align:center; color:#94a3b8; margin-top:40px; font-size:14px;">저장된 프롬프트가 없습니다.</div>`;
                return;
            }

            box.innerHTML = filtered.map(item => `
                <div class="archive-card">
                    <div style="font-size:11px; color:var(--primary); font-weight:800; margin-bottom:6px; opacity:0.8;">
                        ${escapeHtml(item.ai)} / ${escapeHtml(item.use)}
                    </div>
                    <strong style="font-size:16px; display:block; margin-bottom:8px;">${escapeHtml(item.title)}</strong>
                    <div style="font-size:13px; color:#64748b; line-height:1.5; height:3.2em; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;">
                        ${escapeHtml(item.detail || '상세 내용 없음')}
                    </div>
                    <div class="card-actions">
                        <button class="action-btn action-load" onclick="loadItem(${item.id}, false)">보기</button>
                        <button class="action-btn action-load" style="background:#dcfce7; color:#15803d;" onclick="loadItem(${item.id}, true)">수정</button>
                        <button class="action-btn" style="background:#f1f5f9; color:#475569;" onclick="copyBuiltPrompt(${item.id})">복사</button>
                        <button class="action-btn action-del" onclick="deleteItem(${item.id})">삭제</button>
                    </div>
                </div>
            `).join('');
        }

        // 폼 초기화
        function resetFields() {
            document.getElementById('titleIn').value = '';
            document.getElementById('toneIn').value = '';
            document.getElementById('detailIn').value = '';
            document.getElementById('customChipIn').value = '';
            editId = null;
            document.getElementById('modeStatus').textContent = 'NEW';
            updateResult();
        }

        // 칩 추가
        function addChip() {
            const input = document.getElementById('customChipIn');
            const val = input.value.trim();
            if (!val) return;
            if (!chips.includes(val)) {
                chips.push(val);
                saveStorage();
                renderChips();
                showToast('키워드가 추가되었습니다.');
            }
            input.value = '';
        }

        function renderChips() {
            document.getElementById('chipBox').innerHTML = chips.map(c => `
                <span class="chip" onclick="applyChip('${escapeJsString(c)}')">${escapeHtml(c)}</span>
            `).join('');
        }

        function applyChip(text) {
            const area = document.getElementById('detailIn');
            area.value += (area.value ? '\n' : '') + '- ' + text;
            updateResult();
        }

        // 아이템 불러오기
        function loadItem(id, isEdit) {
            const item = savedData.find(d => d.id === id);
            if (!item) return;

            document.getElementById('titleIn').value = item.title;
            document.getElementById('aiSel').value = item.ai;
            document.getElementById('useSel').value = item.use;
            document.getElementById('toneIn').value = item.tone;
            document.getElementById('detailIn').value = item.detail;

            editId = isEdit ? id : null;
            document.getElementById('modeStatus').textContent = isEdit ? 'EDITING' : 'NEW';
            updateResult();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 복사 기능
        async function copyBuiltPrompt(id) {
            const item = savedData.find(d => d.id === id);
            const text = item ? buildPromptString(item) : document.getElementById('resultOut').textContent;
            try {
                await navigator.clipboard.writeText(text);
                showToast('클립보드에 복사되었습니다!');
            } catch (e) { showToast('복사 실패'); }
        }

        function buildPromptString(item) {
            return `[SYSTEM CONTEXT]\n당신은 "${item.use}" 전문가입니다.\n[MISSION]\n작업명: ${item.title}\n[REQUIREMENTS]\n${item.detail}`;
        }

        // 저장 기능
        document.getElementById('saveBtn').onclick = () => {
            const title = document.getElementById('titleIn').value.trim();
            if (!title) { showToast('제목을 입력해주세요.'); return; }

            const data = {
                id: editId || Date.now(),
                title,
                ai: document.getElementById('aiSel').value,
                use: document.getElementById('useSel').value,
                tone: document.getElementById('toneIn').value.trim(),
                detail: document.getElementById('detailIn').value.trim()
            };

            if (editId) {
                const idx = savedData.findIndex(d => d.id === editId);
                if (idx !== -1) savedData[idx] = data;
            } else {
                savedData.unshift(data);
            }

            saveStorage();
            renderList();
            renderFilterOptions();
            resetFields();
            showToast('성공적으로 저장되었습니다.');
        };

        // 삭제 기능
        function deleteItem(id) {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            savedData = savedData.filter(d => d.id !== id);
            saveStorage();
            renderList();
            showToast('삭제되었습니다.');
        }

        // 유틸리티 함수들
        function renderSelect(id, options) {
            const el = document.getElementById(id);
            el.innerHTML = options.map(opt => `<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`).join('');
        }

        function renderFilterOptions() {
            const filter = document.getElementById('categoryFilter');
            const current = filter.value;
            filter.innerHTML = '<option value="all">전체 카테고리</option>' + 
                useOptions.map(opt => `<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`).join('');
            filter.value = current || 'all';
        }

        function openModal(id) {
            targetSelectId = id;
            document.getElementById('modalDesc').textContent = id === 'aiSel' ? '새로운 AI 모델 명칭을 입력하세요.' : '새로운 카테고리 명칭을 입력하세요.';
            document.getElementById('categoryModal').classList.add('show');
            document.getElementById('modalInput').focus();
        }

        function closeModal() { document.getElementById('categoryModal').classList.remove('show'); }

        document.getElementById('modalConfirmBtn').onclick = () => {
            const val = document.getElementById('modalInput').value.trim();
            if (!val) return closeModal();
            if (targetSelectId === 'aiSel') {
                if (!aiOptions.includes(val)) { aiOptions.push(val); renderSelect('aiSel', aiOptions); }
            } else {
                if (!useOptions.includes(val)) { useOptions.push(val); renderSelect('useSel', useOptions); renderFilterOptions(); }
            }
            document.getElementById(targetSelectId).value = val;
            saveStorage();
            updateResult();
            closeModal();
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        function escapeHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
        function escapeJsString(s) { return s.replace(/'/g, "\\'"); }

        // 이벤트 리스너 등록
        document.addEventListener('DOMContentLoaded', init);
        document.getElementById('resetBtn').onclick = resetFields;
        document.getElementById('searchIn').oninput = renderList;
        document.getElementById('categoryFilter').onchange = renderList;
        ['titleIn', 'toneIn', 'detailIn', 'aiSel', 'useSel'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateResult);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Studio Pro</title>

<style>
body { font-family: sans-serif; background:#f1f5f9; padding:20px; }

.container { display:flex; gap:20px; }
.card { background:white; padding:20px; border-radius:12px; flex:1; }

.filter-box { display:grid; grid-template-columns:1fr 1fr 1.5fr; gap:10px; margin-bottom:20px; }

.archive-card { border:1px solid #ddd; padding:15px; margin-bottom:10px; border-radius:10px; }
button { padding:6px 10px; margin-top:10px; cursor:pointer; }
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>Editor</h3>
<input id="titleIn" placeholder="제목"><br><br>

<select id="aiSel"></select><br><br>
<select id="useSel"></select><br><br>

<input id="toneIn" placeholder="톤"><br><br>
<textarea id="detailIn" placeholder="내용"></textarea><br><br>

<div id="resultOut"></div>
</div>

<div class="card">
<h3>Archive</h3>

<div class="filter-box">
<select id="categoryFilter"><option value="all">전체 카테고리</option></select>
<select id="aiFilter"><option value="all">전체 AI</option></select>
<input id="searchIn" placeholder="검색">
</div>

<div id="listBox"></div>
</div>

</div>

<script>

let savedData = [
{ id:1, title:"코드 리팩토링", ai:"GPT-4o", use:"코드 최적화", detail:"코드 개선" },
{ id:2, title:"블로그 작성", ai:"Claude 3.5", use:"콘텐츠 제작", detail:"UX 글 작성" },
{ id:3, title:"서비스 기획", ai:"Gemini 1.5 Pro", use:"전략 기획", detail:"아이디어 기획" }
];

let aiOptions = ["GPT-4o","Claude 3.5","Gemini 1.5 Pro"];
let useOptions = ["코드 최적화","전략 기획","콘텐츠 제작"];

function init(){
  renderSelect("aiSel", aiOptions);
  renderSelect("useSel", useOptions);
  renderFilterOptions();
  renderAiFilterOptions();
  renderList();
}

function renderSelect(id, arr){
  document.getElementById(id).innerHTML =
    arr.map(v=>`<option value="${v}">${v}</option>`).join("");
}

function renderFilterOptions(){
  document.getElementById("categoryFilter").innerHTML =
    '<option value="all">전체 카테고리</option>' +
    useOptions.map(v=>`<option value="${v}">${v}</option>`).join("");
}

function renderAiFilterOptions(){
  document.getElementById("aiFilter").innerHTML =
    '<option value="all">전체 AI</option>' +
    aiOptions.map(v=>`<option value="${v}">${v}</option>`).join("");
}

function renderList(){
  const keyword = document.getElementById("searchIn").value.toLowerCase();
  const category = document.getElementById("categoryFilter").value;
  const ai = document.getElementById("aiFilter").value;

  const filtered = savedData.filter(item=>{
    return (
      (category==="all" || item.use===category) &&
      (ai==="all" || item.ai===ai) &&
      (item.title.toLowerCase().includes(keyword) ||
       item.detail.toLowerCase().includes(keyword))
    );
  });

  document.getElementById("listBox").innerHTML =
    filtered.map(item=>`
      <div class="archive-card">
        <b>${item.title}</b><br>
        ${item.ai} / ${item.use}<br>
        <button onclick="loadItem(${item.id})">불러오기</button>
      </div>
    `).join("");
}

function loadItem(id){
  const item = savedData.find(i=>i.id===id);
  document.getElementById("titleIn").value=item.title;
  document.getElementById("aiSel").value=item.ai;
  document.getElementById("useSel").value=item.use;
  document.getElementById("detailIn").value=item.detail;
}

document.getElementById("searchIn").oninput = renderList;
document.getElementById("categoryFilter").onchange = renderList;
document.getElementById("aiFilter").onchange = renderList;

init();

</script>

</body>
</html>

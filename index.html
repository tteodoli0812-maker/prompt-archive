<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프롬프트 스튜디오 프로</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

:root {
  --primary: #6366f1;
  --primary-hover: #4f46e5;
  --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
  --card-bg: rgba(255, 255, 255, 0.95);
  --text-main: #0f172a;
  --text-sub: #475569;
  --border: #e2e8f0;
  --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
}

* { box-sizing: border-box; font-family: 'Pretendard', sans-serif; transition: all 0.2s ease; }
body { margin: 0; background: var(--bg-gradient); color: var(--text-main); padding: 30px; min-height: 100vh; }

.container { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 1fr 480px; gap: 30px; }
.card { background: var(--card-bg); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.8); padding: 30px; box-shadow: var(--shadow); backdrop-filter: blur(10px); }

h3 { font-size: 20px; font-weight: 800; margin: 0 0 25px 0; display: flex; align-items: center; }
h3::before { content: ''; display: inline-block; width: 4px; height: 20px; background: var(--primary); margin-right: 12px; border-radius: 10px; }

.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.field { display: flex; flex-direction: column; gap: 10px; }
label { font-size: 13px; font-weight: 700; color: var(--text-sub); }

input, select, textarea { width: 100%; padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 14px; outline: none; background: #fff; }
input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

.add-inline-btn { padding: 0 18px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 14px; }
.add-inline-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }

.chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.chip { padding: 8px 14px; background: rgba(99, 102, 241, 0.08); color: var(--primary); border-radius: 10px; font-size: 12px; cursor: pointer; font-weight: 700; }
.chip.active { background: var(--primary); color: white; }

.result-box { background: #0f172a; color: #e2e8f0; padding: 25px; border-radius: 16px; min-height: 400px; font-size: 13.5px; white-space: pre-wrap; margin-top: 20px; line-height: 1.7; border-left: 6px solid var(--primary); font-family: 'Consolas', monospace; overflow-y: auto; }

.btn-group { display: flex; gap: 12px; margin-top: 25px; }
.btn-main { background: var(--primary); color: white; flex: 2; padding: 16px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; font-size: 15px; }
.btn-sub { background: #f1f5f9; color: var(--text-sub); flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; }

.archive-filter-area { background: #f8fafc; padding: 15px; border-radius: 14px; margin-bottom: 20px; border: 1px solid var(--border); }
.filter-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

.list-scroll { max-height: 800px; overflow-y: auto; }
.archive-card { width: 100%; padding: 20px; border: 1px solid var(--border); border-radius: 18px; background: white; margin-bottom: 15px; }
.archive-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-color: var(--primary); }

.tag { font-size: 10px; padding: 4px 8px; border-radius: 5px; background: #f1f5f9; font-weight: 800; color: var(--text-sub); margin-right: 4px; }
.card-actions { display: flex; gap: 6px; margin-top: 15px; }
.card-actions button { flex: 1; padding: 9px; font-size: 11px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }

.load-btn { background: #e0e7ff; color: #4338ca; }
.copy-btn { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
.del-btn { background: #fee2e2; color: #b91c1c; }

.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
.modal-overlay.show { display: flex; }
.modal { background: #1e293b; border-radius: 20px; width: 400px; border: 1px solid #334155; overflow: hidden; }
.modal-body { padding: 30px; }
.modal-input { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 10px; outline: none; }
.modal-footer { padding: 15px 25px; display: flex; justify-content: flex-end; gap: 10px; background: #0f172a; }

#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 12px 30px; border-radius: 12px; display: none; z-index: 2000; font-weight: 600; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
</style>
</head>
<body>

<div class="modal-overlay" id="customModal">
  <div class="modal">
    <div class="modal-body">
      <p id="mTitle" style="color:white; margin:0 0 15px 0; font-weight:700; font-size:18px;">항목 추가</p>
      <input type="text" id="mInput" class="modal-input">
    </div>
    <div class="modal-footer">
      <button class="add-inline-btn" id="mConfirm">확인</button>
      <button class="add-inline-btn" style="background:#475569" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="main-side">
    <div class="card">
      <h3>프롬프트 엔진 <span id="modeLabel" style="font-size:11px; color:var(--primary); margin-left:10px; background:rgba(99,102,241,0.1); padding:2px 8px; border-radius:4px;">[대기 중]</span></h3>
      <div class="input-row">
        <div class="field"><label>핵심 주제</label><input type="text" id="titleIn" placeholder="해결할 주제를 입력하세요"></div>
        <div class="field"><label>AI 엔진 최적화</label><div class="flex-input"><select id="aiSel"></select><button class="add-inline-btn" onclick="openModal('aiSel')">+</button></div></div>
      </div>
      <div class="input-row">
        <div class="field"><label>전문 분야 선택</label><div class="flex-input"><select id="useSel"></select><button class="add-inline-btn" onclick="openModal('useSel')">+</button></div></div>
        <div class="field"><label>답변 톤앤매너</label><input type="text" id="toneIn" placeholder="예: 전문적이고 간결하게"></div>
      </div>
      <div class="field">
        <label>제약 조건 및 키워드 (클릭하여 활성화)</label>
        <div class="flex-input"><input type="text" id="chipIn" placeholder="새 조건 추가"><button class="add-inline-btn" onclick="addChip()">추가</button></div>
        <div class="chip-container" id="chipBox"></div>
        <textarea id="detailIn" rows="4" style="margin-top:12px;" placeholder="추가적인 상세 요청사항을 입력하세요"></textarea>
      </div>
      <div class="result-box" id="resultOut"></div>
      <div class="btn-group">
        <button class="btn-main" id="saveBtn">보관함 저장 및 프롬프트 복사</button>
        <button class="btn-sub" onclick="resetForm()">초기화</button>
      </div>
    </div>
  </div>

  <div class="archive-side">
    <div class="card">
      <h3>스마트 보관함</h3>
      <div class="archive-filter-area">
        <div class="filter-row">
          <select id="aiFilter"></select>
          <select id="categoryFilter"></select>
        </div>
        <input type="text" id="searchIn" placeholder="저장된 프롬프트 검색...">
      </div>
      <div class="list-scroll" id="listBox"></div>
    </div>
  </div>
</div>

<div id="toast">복사 완료!</div>

<script>
let savedData = [];
let aiOptions = ["ChatGPT-4", "Claude-3.5", "Gemini Pro", "Perplexity"];
let useOptions = ["개발(Development)", "비즈니스 기획", "콘텐츠 제작", "데이터 분석", "학술 연구"];
let chips = ["Clean Code", "No Yapping", "Data-Driven", "Step-by-Step", "최신 트렌드 반영"];
let activeChips = new Set(); // 활성화된 칩 관리
let currentTarget = '';

function init() { renderOptions(); renderChips(); renderFilterOptions(); renderList(); updatePreview(); }

function renderOptions() {
  document.getElementById('aiSel').innerHTML = aiOptions.map(v => `<option value="${v}">${v}</option>`).join('');
  document.getElementById('useSel').innerHTML = useOptions.map(v => `<option value="${v}">${v}</option>`).join('');
}

function renderFilterOptions() {
  document.getElementById('aiFilter').innerHTML = '<option value="all">모든 엔진</option>' + aiOptions.map(v => `<option value="${v}">${v}</option>`).join('');
  document.getElementById('categoryFilter').innerHTML = '<option value="all">모든 카테고리</option>' + useOptions.map(v => `<option value="${v}">${v}</option>`).join('');
}

function renderChips() {
  document.getElementById('chipBox').innerHTML = chips.map(c => 
    `<span class="chip ${activeChips.has(c) ? 'active' : ''}" onclick="toggleChip('${c}')">${c}</span>`
  ).join('');
}

function toggleChip(c) {
  if(activeChips.has(c)) activeChips.delete(c);
  else activeChips.add(c);
  renderChips();
  updatePreview();
}

function addChip() {
  const i = document.getElementById('chipIn');
  if(i.value.trim()) { 
    chips.push(i.value.trim()); 
    activeChips.add(i.value.trim());
    renderChips(); i.value = ''; updatePreview();
  }
}

// [핵심] 칩(조건)을 포함하여 전체 프롬프트를 구성하는 함수
function buildFullPrompt(data) {
  const chipText = data.activeChips && data.activeChips.length > 0 ? data.activeChips.join(', ') : 'N/A';
  const detailText = data.detail ? data.detail : '추가 요청 없음';

  return `${chipText}

[ SYSTEM INSTRUCTION: ${data.ai} ]

당신은 최고의 "${data.use}" 전문가입니다. 사용자의 요청 "${data.title || '주제 미정'}"에 대해 아래의 사고 체계를 통해 답변하십시오.

1. CONTEXT ANALYSIS
주제: ${data.title || '미지정'} / 분야: ${data.use}

2. THINKING PROCESS (CoT)
- 사용자의 의도를 분석하고, 가장 정확한 사실 정보를 기반으로 논리를 구성하십시오.
- 톤앤매너: "${data.tone || '전문적이고 논리적인'}" 분위기를 엄격히 준수하십시오.

3. CONSTRAINTS & REQUIREMENTS
- 선택된 조건: ${chipText}
- 상세 지침: ${detailText}
- 가독성을 위해 마크다운 구조를 활용하십시오.
- 불필요한 서론은 생략하고 즉시 핵심 해결책을 제시하십시오.

"위 지침에 따라 "${data.title || '해당 주제'}"에 대한 최상의 결과물을 생성하십시오."`;
}

function updatePreview() {
  const data = {
    ai: document.getElementById('aiSel').value,
    use: document.getElementById('useSel').value,
    title: document.getElementById('titleIn').value,
    tone: document.getElementById('toneIn').value,
    detail: document.getElementById('detailIn').value,
    activeChips: Array.from(activeChips)
  };
  document.getElementById('resultOut').textContent = buildFullPrompt(data);
}

function copyItem(id) {
  let text = "";
  if (id) {
    const item = savedData.find(d => d.id === id);
    if (item) text = buildFullPrompt(item);
  } else {
    text = document.getElementById('resultOut').textContent;
  }
  
  if(!text) return;
  navigator.clipboard.writeText(text);
  showToast('프롬프트 전체가 복사되었습니다!');
}

function renderList() {
  const kw = document.getElementById('searchIn').value.toLowerCase();
  const aiF = document.getElementById('aiFilter').value;
  const useF = document.getElementById('categoryFilter').value;
  const box = document.getElementById('listBox');
  box.innerHTML = '';

  const filtered = savedData.filter(d => {
    const matchKw = d.title.toLowerCase().includes(kw);
    return matchKw && (aiF === 'all' || d.ai === aiF) && (useF === 'all' || d.use === useF);
  });

  filtered.forEach(item => {
    const div = document.createElement('div');
    div.className = 'archive-card';
    div.innerHTML = `
      <div class="meta-tags"><span class="tag">${item.ai}</span><span class="tag">${item.use}</span></div>
      <strong>${item.title}</strong>
      <div style="font-size:11px; color:var(--text-sub); margin-top:5px;">조건: ${item.activeChips.slice(0,2).join(', ')}...</div>
      <div class="card-actions">
        <button class="load-btn" onclick="loadItem(${item.id})">불러오기</button>
        <button class="copy-btn" onclick="copyItem(${item.id})">전체 복사</button>
        <button class="del-btn" onclick="deleteItem(${item.id})">삭제</button>
      </div>
    `;
    box.appendChild(div);
  });
}

function openModal(type) { currentTarget = type; document.getElementById('mTitle').textContent = type === 'aiSel' ? '엔진 추가' : '분야 추가'; document.getElementById('customModal').classList.add('show'); }
function closeModal() { document.getElementById('customModal').classList.remove('show'); document.getElementById('mInput').value = ''; }

document.getElementById('mConfirm').onclick = () => {
  const val = document.getElementById('mInput').value.trim();
  if(!val) return;
  if(currentTarget === 'aiSel') aiOptions.push(val); else useOptions.push(val);
  renderOptions(); renderFilterOptions(); document.getElementById(currentTarget).value = val; updatePreview(); closeModal();
};

function loadItem(id) {
  const item = savedData.find(d => d.id === id);
  if(!item) return;
  document.getElementById('titleIn').value = item.title;
  document.getElementById('aiSel').value = item.ai;
  document.getElementById('useSel').value = item.use;
  document.getElementById('toneIn').value = item.tone;
  document.getElementById('detailIn').value = item.detail;
  activeChips = new Set(item.activeChips);
  renderChips();
  updatePreview();
}

document.getElementById('saveBtn').onclick = () => {
  const title = document.getElementById('titleIn').value;
  if(!title) return alert('주제를 입력하세요.');
  const obj = { 
    id: Date.now(), title, ai: document.getElementById('aiSel').value, 
    use: document.getElementById('useSel').value, tone: document.getElementById('toneIn').value, 
    detail: document.getElementById('detailIn').value,
    activeChips: Array.from(activeChips)
  };
  savedData.unshift(obj);
  copyItem(); 
  resetForm(); renderList();
};

function resetForm() {
  document.getElementById('titleIn').value = ''; document.getElementById('toneIn').value = ''; document.getElementById('detailIn').value = '';
  activeChips.clear(); renderChips(); updatePreview();
}

function deleteItem(id) { if(confirm('삭제하시겠습니까?')) { savedData = savedData.filter(d => d.id !== id); renderList(); } }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 2000); }

document.getElementById('searchIn').oninput = renderList;
document.getElementById('aiFilter').onchange = renderList;
document.getElementById('categoryFilter').onchange = renderList;
['titleIn', 'aiSel', 'useSel', 'toneIn', 'detailIn'].forEach(id => document.getElementById(id).oninput = updatePreview);

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Archive Pro - Final Edition</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

:root {
  --bg: #f8fafc;
  --card: #ffffff;
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --primary-soft: #eef2ff;
  --text-main: #1e293b;
  --text-sub: #64748b;
  --border: #e2e8f0;
  --radius-lg: 16px;
  --radius-md: 10px;
}

* { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
body { margin: 0; background: var(--bg); color: var(--text-main); padding: 20px; }

.container { 
  max-width: 1200px; 
  margin: 0 auto; 
  display: grid; 
  grid-template-columns: 1fr 450px; 
  gap: 24px; 
}

.card { 
  background: var(--card); 
  border-radius: var(--radius-lg); 
  border: 1px solid var(--border); 
  padding: 24px; 
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
}

h3 { font-size: 18px; margin: 0 0 20px 0; display: flex; justify-content: space-between; align-items: center; }

/* 입력 폼 스타일 */
.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.field { display: flex; flex-direction: column; gap: 8px; }
label { font-size: 13px; font-weight: 700; color: var(--text-main); }

.flex-input { display: flex; gap: 8px; align-items: stretch; }
input, select, textarea { 
  width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 14px; outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

/* 추가 버튼 정렬 수정 (이미지 2 대응) */
.add-inline-btn { 
  padding: 0 20px; 
  background: var(--primary); 
  color: white; 
  border: none; 
  border-radius: var(--radius-md); 
  cursor: pointer; 
  font-weight: 700; 
  font-size: 14px;
  white-space: nowrap; /* 줄바꿈 방지 */
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* 칩 스타일 */
.chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.chip { 
  padding: 6px 12px; background: var(--primary-soft); color: var(--primary); 
  border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 600;
}

/* 결과창 성의있게 개편 */
.result-box { 
  background: #1e293b; color: #f8fafc; padding: 20px; border-radius: var(--radius-md); 
  min-height: 200px; font-size: 13px; white-space: pre-wrap; margin-top: 12px; line-height: 1.7;
  border-left: 4px solid var(--primary);
}

.btn-group { display: flex; gap: 10px; margin-top: 20px; }
.btn-main { background: var(--primary); color: white; flex: 2; padding: 14px; border-radius: var(--radius-md); border: none; font-weight: 700; cursor: pointer; }
.btn-sub { background: #f1f5f9; color: var(--text-sub); flex: 1; padding: 14px; border-radius: var(--radius-md); border: none; font-weight: 700; cursor: pointer; }

/* 보관함 리스트 디자인 (이미지 1 대응 - 꽉 차게) */
.list-scroll { 
  max-height: 800px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
}
.archive-card { 
  width: 100%; /* 너비 꽉 차게 */
  padding: 20px; border: 1.5px solid var(--border); border-radius: var(--radius-lg); 
  background: white; transition: 0.2s; position: relative;
}
.archive-card:hover { border-color: var(--primary); box-shadow: 0 8px 15px -3px rgba(0,0,0,0.1); }

.meta-tags { display: flex; gap: 6px; margin-bottom: 10px; }
.tag { font-size: 11px; padding: 3px 8px; border-radius: 4px; background: #f1f5f9; font-weight: 700; color: var(--text-sub); }

.archive-card strong { font-size: 16px; display: block; margin-bottom: 8px; color: var(--text-main); }
.archive-card .desc-preview { font-size: 13px; color: var(--text-sub); margin-bottom: 15px; }

/* 보관함 버튼 정렬 */
.card-actions { display: flex; gap: 8px; width: 100%; }
.card-actions button { 
  flex: 1; padding: 8px; font-size: 12px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer;
}
.load-btn { background: #eef2ff; color: #4f46e5; }
.edit-btn { background: #ecfdf5; color: #10b981; }
.copy-btn { background: #f8fafc; color: #64748b; border: 1px solid var(--border); }
.del-btn { background: #fef2f2; color: #ef4444; }

/* 모달 디자인 */
.modal-overlay { 
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); 
  display: none; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal { background: #222; border-radius: 12px; width: 400px; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
.modal-header { padding: 15px; background: #111; color: #ccc; font-size: 12px; border-bottom: 1px solid #333; }
.modal-body { padding: 24px; }
.modal-body p { color: white; margin: 0 0 15px 0; font-weight: 600; }
.modal-footer { padding: 15px; display: flex; justify-content: flex-end; gap: 10px; background: #1a1a1a; }
.m-btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
.m-confirm { background: #3b82f6; color: white; }
.m-cancel { background: #444; color: #ccc; }

#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 8px; display: none; z-index: 10000; }

@media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="modal-overlay" id="customModal">
  <div class="modal">
    <div class="modal-header" id="mHeader">tteodoli0812-maker.github.io의 메시지</div>
    <div class="modal-body">
      <p id="mTitle">항목 추가</p>
      <input type="text" id="mInput" style="background:#333; border:1px solid #444; color:white;">
    </div>
    <div class="modal-footer">
      <button class="m-btn m-confirm" id="mConfirm">확인</button>
      <button class="m-btn m-cancel" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="main-side">
    <div class="card">
      <h3>프롬프트 제작 도구 <span id="modeLabel" style="font-size:11px; color:var(--primary);">[새 모드]</span></h3>
      
      <div class="input-row">
        <div class="field">
          <label>제목</label>
          <input type="text" id="titleIn" placeholder="제목을 입력하세요">
        </div>
        <div class="field">
          <label>AI 엔진</label>
          <div class="flex-input">
            <select id="aiSel"></select>
            <button class="add-inline-btn" onclick="openModal('aiSel')">추가</button>
          </div>
        </div>
      </div>

      <div class="input-row">
        <div class="field">
          <label>용도 카테고리</label>
          <div class="flex-input">
            <select id="useSel"></select>
            <button class="add-inline-btn" onclick="openModal('useSel')">추가</button>
          </div>
        </div>
        <div class="field">
          <label>톤앤매너</label>
          <input type="text" id="toneIn" placeholder="예: 전문적인, 유머러스한">
        </div>
      </div>

      <div class="field">
        <label>상세 조건 및 제약 사항</label>
        <div class="flex-input">
          <input type="text" id="chipIn" placeholder="조건 키워드 입력">
          <button class="add-inline-btn" onclick="addChip()">추가</button>
        </div>
        <div class="chip-container" id="chipBox"></div>
        <textarea id="detailIn" rows="5" style="margin-top:12px;" placeholder="AI에게 전달할 상세 지침을 작성하세요."></textarea>
      </div>

      <div class="result-box" id="resultOut"></div>
      
      <div class="btn-group">
        <button class="btn-main" id="saveBtn">보관함 저장</button>
        <button class="btn-sub" onclick="resetForm()">초기화</button>
      </div>
    </div>
  </div>

  <div class="archive-side">
    <div class="card">
      <h3>프롬프트 보관함</h3>
      <input type="text" id="searchIn" placeholder="검색어를 입력하세요..." style="margin-bottom:20px;">
      <div class="list-scroll" id="listBox"></div>
    </div>
  </div>
</div>

<div id="toast">복사되었습니다!</div>

<script>
// --- 데이터 및 초기화 ---
// 성의 있는 예시 데이터 추가 (ai별, 용도별)
let savedData = [
  { 
    id: 1, title: "파이썬 데이터 시각화 스크립트", ai: "ChatGPT", use: "코딩", tone: "분석적이고 정확하게", 
    detail: "Pandas와 Matplotlib을 사용해서 CSV 데이터를 시각화하는 코드를 짜줘. 주석은 한글로 달아주고 코드 효율성을 높여줘." 
  },
  { 
    id: 2, title: "블로그 IT 리뷰 포스팅 초안", ai: "Claude", use: "글쓰기", tone: "친근하고 설득력 있게", 
    detail: "최신 스마트폰 리뷰 글을 써줘. 서론-본론-결론 구조로 작성하고, 독자들이 흥미를 느낄만한 소제목을 3개 이상 포함해줘." 
  },
  { 
    id: 3, title: "주간 업무 보고 기획안", ai: "Gemini", use: "기획", tone: "격식 있고 간결하게", 
    detail: "한 주 동안 진행된 마케팅 성과를 요약하는 보고서 양식을 만들어줘. 수치 위주의 불렛포인트 형식을 사용해줘." 
  }
];

let aiOptions = ["ChatGPT", "Claude", "Gemini", "Llama 3"];
let useOptions = ["코딩", "글쓰기", "기획", "이미지 생성", "마케팅"];
let chips = ["단계별 설명", "핵심 요약 포함", "전문 용어 제외", "표 형식 사용"];
let editId = null;
let currentTarget = '';

function init() {
  renderOptions();
  renderChips();
  renderList();
  updatePreview();
}

// --- UI 렌더링 기능 (기존 로직 유지) ---
function renderOptions() {
  const a = document.getElementById('aiSel');
  const u = document.getElementById('useSel');
  a.innerHTML = aiOptions.map(v => `<option value="${v}">${v}</option>`).join('');
  u.innerHTML = useOptions.map(v => `<option value="${v}">${v}</option>`).join('');
}

function renderChips() {
  const box = document.getElementById('chipBox');
  box.innerHTML = chips.map(c => `<span class="chip" onclick="applyChip('${c}')">${c}</span>`).join('');
}

function applyChip(c) {
  const d = document.getElementById('detailIn');
  d.value += (d.value ? ', ' : '') + c;
  updatePreview();
}

function addChip() {
  const i = document.getElementById('chipIn');
  if(i.value.trim()) {
    chips.push(i.value.trim());
    renderChips();
    i.value = '';
  }
}

// --- 프롬프트 생성 (더 성의있게 개편) ---
function updatePreview() {
  const title = document.getElementById('titleIn').value || '(제목 없음)';
  const ai = document.getElementById('aiSel').value;
  const use = document.getElementById('useSel').value;
  const tone = document.getElementById('toneIn').value || '일반적인';
  const detail = document.getElementById('detailIn').value || '내용을 입력해주세요.';

  const template = `[ 시스템 지침: ${ai} 전용 ]\n\n` +
                   `● 페르소나 및 목표: ${use} 전문가로서 "${title}" 작업을 수행합니다.\n` +
                   `● 출력 톤앤매너: ${tone}\n\n` +
                   `[ 상세 요청 내용 ]\n${detail}\n\n` +
                   `※ 위 지침에 따라 최상의 결과물을 생성해 주세요.`;
  
  document.getElementById('resultOut').textContent = template;
}

// --- 보관함 리스트 (이미지 1 문제 해결) ---
function renderList() {
  const kw = document.getElementById('searchIn').value.toLowerCase();
  const box = document.getElementById('listBox');
  box.innerHTML = '';

  savedData.filter(d => d.title.toLowerCase().includes(kw)).forEach(item => {
    const div = document.createElement('div');
    div.className = 'archive-card';
    div.innerHTML = `
      <div class="meta-tags">
        <span class="tag">${item.ai}</span>
        <span class="tag">${item.use}</span>
      </div>
      <strong>${item.title}</strong>
      <div class="desc-preview">${item.detail.substring(0, 40)}...</div>
      <div class="card-actions">
        <button class="load-btn" onclick="loadItem(${item.id})">불러오기</button>
        <button class="edit-btn" onclick="startEdit(${item.id})">수정</button>
        <button class="copy-btn" onclick="copyItem(${item.id})">복사</button>
        <button class="del-btn" onclick="deleteItem(${item.id})">삭제</button>
      </div>
    `;
    box.appendChild(div);
  });
}

// --- 커스텀 모달 기능 ---
function openModal(type) {
  currentTarget = type;
  document.getElementById('mTitle').textContent = type === 'aiSel' ? '새 AI 엔진 명칭 입력' : '새 카테고리 명칭 입력';
  document.getElementById('customModal').classList.add('show');
  document.getElementById('mInput').focus();
}

function closeModal() {
  document.getElementById('customModal').classList.remove('show');
  document.getElementById('mInput').value = '';
}

document.getElementById('mConfirm').onclick = () => {
  const val = document.getElementById('mInput').value.trim();
  if(!val) return;
  if(currentTarget === 'aiSel') aiOptions.push(val);
  else useOptions.push(val);
  renderOptions();
  document.getElementById(currentTarget).value = val;
  updatePreview();
  closeModal();
};

// --- 액션 기능 (수정/저장/삭제/복사) ---
function loadItem(id) {
  const item = savedData.find(d => d.id === id);
  if(item) {
    document.getElementById('titleIn').value = item.title;
    document.getElementById('aiSel').value = item.ai;
    document.getElementById('useSel').value = item.use;
    document.getElementById('toneIn').value = item.tone;
    document.getElementById('detailIn').value = item.detail;
    updatePreview();
    showToast('데이터를 불러왔습니다.');
  }
}

function startEdit(id) {
  loadItem(id);
  editId = id;
  document.getElementById('modeLabel').textContent = "[수정 모드]";
}

function deleteItem(id) {
  if(confirm('삭제할까요?')) {
    savedData = savedData.filter(d => d.id !== id);
    renderList();
  }
}

function copyItem(id) {
  const item = savedData.find(d => d.id === id);
  const text = `[${item.ai} / ${item.use}] ${item.title}\n\n${item.detail}`;
  navigator.clipboard.writeText(text);
  showToast('클립보드에 복사되었습니다.');
}

document.getElementById('saveBtn').onclick = () => {
  const title = document.getElementById('titleIn').value;
  if(!title) return alert('제목을 입력하세요.');

  const obj = {
    id: editId || Date.now(),
    title,
    ai: document.getElementById('aiSel').value,
    use: document.getElementById('useSel').value,
    tone: document.getElementById('toneIn').value,
    detail: document.getElementById('detailIn').value
  };

  if(editId) {
    const idx = savedData.findIndex(d => d.id === editId);
    savedData[idx] = obj;
  } else {
    savedData.unshift(obj);
  }
  
  resetForm();
  renderList();
  showToast('저장 완료!');
};

function resetForm() {
  document.getElementById('titleIn').value = '';
  document.getElementById('toneIn').value = '';
  document.getElementById('detailIn').value = '';
  editId = null;
  document.getElementById('modeLabel').textContent = "[새 모드]";
  updatePreview();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

// 이벤트 바인딩
document.getElementById('searchIn').oninput = renderList;
['titleIn', 'aiSel', 'useSel', 'toneIn', 'detailIn'].forEach(id => {
  document.getElementById(id).oninput = updatePreview;
});

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Archive Pro - Dual Filter</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

:root {
  --bg: #f8fafc;
  --card: #ffffff;
  --primary: #4f46e5;
  --primary-soft: #eef2ff;
  --text-main: #1e293b;
  --text-sub: #64748b;
  --border: #e2e8f0;
  --radius-lg: 16px;
  --radius-md: 10px;
}

* { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
body { margin: 0; background: var(--bg); color: var(--text-main); padding: 20px; }

.container { 
  max-width: 1200px; 
  margin: 0 auto; 
  display: grid; 
  grid-template-columns: 1fr 450px; 
  gap: 24px; 
}

.card { 
  background: var(--card); border-radius: var(--radius-lg); border: 1px solid var(--border); 
  padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
}

h3 { font-size: 18px; margin: 0 0 20px 0; display: flex; justify-content: space-between; align-items: center; }

/* 입력 폼 스타일 */
.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.field { display: flex; flex-direction: column; gap: 8px; }
label { font-size: 13px; font-weight: 700; color: var(--text-main); }

.flex-input { display: flex; gap: 8px; align-items: stretch; }
input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 14px; outline: none; }
input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

.add-inline-btn { 
  padding: 0 15px; background: var(--primary); color: white; border: none; border-radius: var(--radius-md); 
  cursor: pointer; font-weight: 700; font-size: 14px; white-space: nowrap; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

.chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.chip { padding: 6px 12px; background: var(--primary-soft); color: var(--primary); border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 600; }

.result-box { 
  background: #1e293b; color: #f8fafc; padding: 20px; border-radius: var(--radius-md); 
  min-height: 200px; font-size: 13px; white-space: pre-wrap; margin-top: 12px; line-height: 1.7; border-left: 4px solid var(--primary);
}

.btn-group { display: flex; gap: 10px; margin-top: 20px; }
.btn-main { background: var(--primary); color: white; flex: 2; padding: 14px; border-radius: var(--radius-md); border: none; font-weight: 700; cursor: pointer; }
.btn-sub { background: #f1f5f9; color: var(--text-sub); flex: 1; padding: 14px; border-radius: var(--radius-md); border: none; font-weight: 700; cursor: pointer; }

/* 보관함 상단 필터 레이아웃 (Dual Filter) */
.archive-filter-area { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.filter-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.search-row { width: 100%; }

.list-scroll { max-height: 800px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
.archive-card { width: 100%; padding: 20px; border: 1.5px solid var(--border); border-radius: var(--radius-lg); background: white; transition: 0.2s; }
.archive-card:hover { border-color: var(--primary); box-shadow: 0 8px 15px -3px rgba(0,0,0,0.1); }

.meta-tags { display: flex; gap: 6px; margin-bottom: 10px; }
.tag { font-size: 11px; padding: 3px 8px; border-radius: 4px; background: #f1f5f9; font-weight: 700; color: var(--text-sub); }

.card-actions { display: flex; gap: 6px; margin-top: 15px; }
.card-actions button { flex: 1; padding: 8px; font-size: 12px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; }
.load-btn { background: #eef2ff; color: #4f46e5; }
.edit-btn { background: #ecfdf5; color: #10b981; }
.copy-btn { background: #f8fafc; color: #64748b; border: 1px solid var(--border); }
.del-btn { background: #fef2f2; color: #ef4444; }

/* 커스텀 팝업 (Image b0df4a 반영) */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: none; align-items: center; justify-content: center; z-index: 9999; }
.modal-overlay.show { display: flex; }
.modal { background: #2b2b2b; border-radius: 12px; width: 420px; overflow: hidden; }
.modal-header { padding: 15px 20px; background: #222; color: #fff; font-size: 14px; border-bottom: 1px solid #3d3d3d; }
.modal-body { padding: 25px 20px; }
.modal-input { width: 100%; background: #1a1a1a; border: 1px solid #444; color: white; padding: 12px; border-radius: 6px; outline: none; }
.modal-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }
.modal-footer { padding: 15px 20px; display: flex; justify-content: flex-end; gap: 10px; background: #222; }
.m-btn { padding: 8px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
.m-confirm { background: #3b82f6; color: white; }
.m-cancel { background: #444; color: #ccc; }

#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 25px; border-radius: 50px; display: none; z-index: 10000; font-size: 13px; }
</style>
</head>
<body>

<div class="modal-overlay" id="customModal">
  <div class="modal">
    <div class="modal-header">tteodoli0812-maker.github.io의 메시지</div>
    <div class="modal-body">
      <p id="mTitle" style="color:white; margin-bottom:10px;">항목 추가</p>
      <input type="text" id="mInput" class="modal-input">
    </div>
    <div class="modal-footer">
      <button class="m-btn m-confirm" id="mConfirm">확인</button>
      <button class="m-btn m-cancel" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="main-side">
    <div class="card">
      <h3>프롬프트 제작 도구 <span id="modeLabel" style="font-size:11px; color:var(--primary);">[새 모드]</span></h3>
      <div class="input-row">
        <div class="field">
          <label>제목</label>
          <input type="text" id="titleIn" placeholder="제목을 입력하세요">
        </div>
        <div class="field">
          <label>AI 엔진</label>
          <div class="flex-input">
            <select id="aiSel"></select>
            <button class="add-inline-btn" onclick="openModal('aiSel')">추가</button>
          </div>
        </div>
      </div>
      <div class="input-row">
        <div class="field">
          <label>용도 카테고리</label>
          <div class="flex-input">
            <select id="useSel"></select>
            <button class="add-inline-btn" onclick="openModal('useSel')">추가</button>
          </div>
        </div>
        <div class="field">
          <label>톤앤매너</label>
          <input type="text" id="toneIn" placeholder="예: 전문적인">
        </div>
      </div>
      <div class="field">
        <label>상세 조건 및 제약 사항</label>
        <div class="flex-input">
          <input type="text" id="chipIn" placeholder="조건 입력">
          <button class="add-inline-btn" onclick="addChip()">추가</button>
        </div>
        <div class="chip-container" id="chipBox"></div>
        <textarea id="detailIn" rows="5" style="margin-top:12px;" placeholder="상세 지침을 입력하세요."></textarea>
      </div>
      <div class="result-box" id="resultOut"></div>
      <div class="btn-group">
        <button class="btn-main" id="saveBtn">보관함 저장</button>
        <button class="btn-sub" onclick="resetForm()">초기화</button>
      </div>
    </div>
  </div>

  <div class="archive-side">
    <div class="card">
      <h3>프롬프트 보관함</h3>
      <div class="archive-filter-area">
        <div class="filter-row">
          <select id="aiFilter" style="background:#f1f5f9; border:none; font-weight:700;">
            <option value="all">전체 AI</option>
          </select>
          <select id="categoryFilter" style="background:#f1f5f9; border:none; font-weight:700;">
            <option value="all">전체 용도</option>
          </select>
        </div>
        <div class="search-row">
          <input type="text" id="searchIn" placeholder="검색어를 입력하세요...">
        </div>
      </div>
      <div class="list-scroll" id="listBox"></div>
    </div>
  </div>
</div>

<div id="toast">완료되었습니다!</div>

<script>
let savedData = [
  { id: 1, title: "파이썬 데이터 분석", ai: "ChatGPT", use: "코딩", tone: "분석적", detail: "Pandas 라이브러리를 사용해서 데이터프레임의 결측치를 처리하는 코드를 작성해줘." },
  { id: 2, title: "IT 신제품 리뷰 기사", ai: "Claude", use: "글쓰기", tone: "친근한", detail: "최신 무선 이어폰의 장단점을 비교하는 블로그 포스팅 초안을 작성해줘." }
];
let aiOptions = ["ChatGPT", "Claude", "Gemini"];
let useOptions = ["코딩", "글쓰기", "기획", "마케팅"];
let chips = ["단계별 설명", "핵심 요약", "표 형식 사용"];
let editId = null;
let currentTarget = '';

function init() {
  renderOptions();
  renderChips();
  renderFilterOptions();
  renderList();
  updatePreview();
}

function renderOptions() {
  document.getElementById('aiSel').innerHTML = aiOptions.map(v => `<option value="${v}">${v}</option>`).join('');
  document.getElementById('useSel').innerHTML = useOptions.map(v => `<option value="${v}">${v}</option>`).join('');
}

function renderFilterOptions() {
  const af = document.getElementById('aiFilter');
  const cf = document.getElementById('categoryFilter');
  af.innerHTML = '<option value="all">전체 AI</option>' + aiOptions.map(v => `<option value="${v}">${v}</option>`).join('');
  cf.innerHTML = '<option value="all">전체 용도</option>' + useOptions.map(v => `<option value="${v}">${v}</option>`).join('');
}

function renderChips() {
  document.getElementById('chipBox').innerHTML = chips.map(c => `<span class="chip" onclick="applyChip('${c}')">${c}</span>`).join('');
}

function applyChip(c) {
  const d = document.getElementById('detailIn');
  d.value += (d.value ? ', ' : '') + c;
  updatePreview();
}

function addChip() {
  const i = document.getElementById('chipIn');
  if(i.value.trim()) { chips.push(i.value.trim()); renderChips(); i.value = ''; }
}

function updatePreview() {
  const res = `[${document.getElementById('aiSel').value} / ${document.getElementById('useSel').value}]\n목표: ${document.getElementById('titleIn').value || '제목없음'}\n말투: ${document.getElementById('toneIn').value || '일반'}\n내용: ${document.getElementById('detailIn').value || '요청사항 없음'}`;
  document.getElementById('resultOut').textContent = res;
}

function renderList() {
  const kw = document.getElementById('searchIn').value.toLowerCase();
  const aiF = document.getElementById('aiFilter').value;
  const useF = document.getElementById('categoryFilter').value;
  const box = document.getElementById('listBox');
  box.innerHTML = '';

  const filtered = savedData.filter(d => {
    const matchKw = d.title.toLowerCase().includes(kw) || d.detail.toLowerCase().includes(kw);
    const matchAi = (aiF === 'all' || d.ai === aiF);
    const matchUse = (useF === 'all' || d.use === useF);
    return matchKw && matchAi && matchUse;
  });

  filtered.forEach(item => {
    const div = document.createElement('div');
    div.className = 'archive-card';
    div.innerHTML = `
      <div class="meta-tags"><span class="tag">${item.ai}</span><span class="tag">${item.use}</span></div>
      <strong>${item.title}</strong>
      <div style="font-size:13px; color:var(--text-sub);">${item.detail.substring(0, 50)}...</div>
      <div class="card-actions">
        <button class="load-btn" onclick="loadItem(${item.id})">열기</button>
        <button class="edit-btn" onclick="startEdit(${item.id})">수정</button>
        <button class="copy-btn" onclick="copyItem(${item.id})">복사</button>
        <button class="del-btn" onclick="deleteItem(${item.id})">삭제</button>
      </div>
    `;
    box.appendChild(div);
  });
}

function openModal(type) {
  currentTarget = type;
  document.getElementById('mTitle').textContent = type === 'aiSel' ? '새 AI 엔진 추가' : '새 카테고리 추가';
  document.getElementById('customModal').classList.add('show');
}

function closeModal() { document.getElementById('customModal').classList.remove('show'); document.getElementById('mInput').value = ''; }

document.getElementById('mConfirm').onclick = () => {
  const val = document.getElementById('mInput').value.trim();
  if(!val) return;
  if(currentTarget === 'aiSel') aiOptions.push(val);
  else useOptions.push(val);
  renderOptions();
  renderFilterOptions();
  document.getElementById(currentTarget).value = val;
  updatePreview();
  closeModal();
};

function loadItem(id) {
  const item = savedData.find(d => d.id === id);
  if(!item) return;
  document.getElementById('titleIn').value = item.title;
  document.getElementById('aiSel').value = item.ai;
  document.getElementById('useSel').value = item.use;
  document.getElementById('toneIn').value = item.tone;
  document.getElementById('detailIn').value = item.detail;
  updatePreview();
}

function startEdit(id) { loadItem(id); editId = id; document.getElementById('modeLabel').textContent = "[수정 모드]"; }

function deleteItem(id) { if(confirm('삭제할까요?')) { savedData = savedData.filter(d => d.id !== id); renderList(); } }

function copyItem(id) {
  const item = savedData.find(d => d.id === id);
  navigator.clipboard.writeText(`[${item.ai}/${item.use}] ${item.title}\n${item.detail}`);
  showToast('복사되었습니다!');
}

document.getElementById('saveBtn').onclick = () => {
  const title = document.getElementById('titleIn').value;
  if(!title) return alert('제목을 입력하세요!');
  const obj = { id: editId || Date.now(), title, ai: document.getElementById('aiSel').value, use: document.getElementById('useSel').value, tone: document.getElementById('toneIn').value, detail: document.getElementById('detailIn').value };
  if(editId) savedData[savedData.findIndex(d => d.id === editId)] = obj;
  else savedData.unshift(obj);
  resetForm(); renderList(); showToast('저장 완료!');
};

function resetForm() {
  document.getElementById('titleIn').value = ''; document.getElementById('toneIn').value = ''; document.getElementById('detailIn').value = '';
  editId = null; document.getElementById('modeLabel').textContent = "[새 모드]"; updatePreview();
}

function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 2000); }

document.getElementById('searchIn').oninput = renderList;
document.getElementById('aiFilter').onchange = renderList;
document.getElementById('categoryFilter').onchange = renderList;
['titleIn', 'aiSel', 'useSel', 'toneIn', 'detailIn'].forEach(id => document.getElementById(id).oninput = updatePreview);
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Studio Pro</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

:root {
  --bg: #f5f7fa; --card: #ffffff; --primary: #6366f1; --primary-hover: #4f46e5;
  --primary-soft: #e0e7ff; --text-main: #1e293b; --text-sub: #64748b;
  --border: #e2e8f0; --shadow-card: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
  --radius-lg: 16px; --radius-md: 10px;
}

* { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
body { margin: 0; background: var(--bg); color: var(--text-main); padding: 40px 20px; line-height: 1.6; }

.container { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 32px; }
.main-header { grid-column: 1 / -1; margin-bottom: 8px; }
.main-header h1 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -0.02em; }

.card { background: var(--card); border-radius: var(--radius-lg); padding: 32px; box-shadow: var(--shadow-card); }
.section-title { font-size: 18px; font-weight: 700; margin: 0 0 20px 0; display: flex; align-items: center; gap: 10px; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: var(--primary-soft); color: var(--primary); font-weight: 800; }

.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.field { display: flex; flex-direction: column; gap: 8px; }
label { font-size: 13px; font-weight: 700; }

.flex-input { display: flex; gap: 8px; align-items: stretch; }
input, select, textarea { 
  width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-md); 
  font-size: 14px; outline: none; background: #fff; transition: 0.2s;
}
input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

.add-inline-btn { 
  padding: 0 16px; background: white; color: var(--primary); border: 1.5px solid var(--primary); 
  border-radius: var(--radius-md); cursor: pointer; font-weight: 700; flex-shrink: 0;
}

.chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.chip { padding: 6px 14px; background: #f8fafc; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); font-weight: 600; color: var(--text-sub); }

.result-box { 
  background: #0f172a; color: #e2e8f0; padding: 24px; border-radius: var(--radius-md); 
  min-height: 200px; font-size: 14px; white-space: pre-wrap; margin-top: 12px;
  font-family: 'Consolas', monospace; border: 1px solid #1e293b;
}

.btn-group { display: flex; gap: 12px; margin-top: 24px; }
.btn-main { background: var(--primary); color: white; flex: 2; padding: 16px; border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; }
.btn-sub { background: #f1f5f9; color: var(--text-sub); flex: 1; padding: 16px; border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; }

/* 보관함 */
.archive-side { position: sticky; top: 40px; height: max-content; }
.filters { display: grid; grid-template-columns: 1fr 1.5fr; gap: 10px; margin-bottom: 20px; }
.list-scroll { max-height: 650px; overflow-y: auto; padding-right: 4px; }
.archive-card { width: 100%; padding: 20px; border: 1px solid var(--border); border-radius: 16px; background: white; margin-bottom: 16px; }
.card-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 16px; }
.action-btn { padding: 8px 0; font-size: 11px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; }
.action-load { background: #e0e7ff; color: #4338ca; }
.action-edit { background: #dcfce7; color: #15803d; }
.copy-btn { background: #f1f5f9; color: var(--text-sub); border: 1px solid #e2e8f0; }
.action-del { background: #fee2e2; color: #b91c1c; }

/* 모달 디자인 (tteodoli 스타일 적용) */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(4px); }
.modal-overlay.show { display: flex; }
.modal { background: #232323; border-radius: 12px; width: 480px; overflow: hidden; }
.modal-header { background: #1a1a1a; padding: 15px 20px; border-bottom: 1px solid #333; color: white; }
.modal-body { padding: 25px 20px; color: white; }
.modal-input { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 6px; background: #2a2a2a; color: white; margin-top: 10px; outline: none; }
.modal-footer { padding: 15px 20px 20px; display: flex; justify-content: flex-end; gap: 10px; }
.btn-modal-confirm { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
.btn-modal-cancel { background: #333; color: white; border: 1px solid #444; padding: 10px 20px; border-radius: 6px; cursor: pointer; }

.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 12px 28px; border-radius: 999px; display: none; z-index: 3000; }
</style>
</head>
<body>

<div class="modal-overlay" id="categoryModal">
  <div class="modal">
    <div class="modal-header"><h4>tteodoli0812-maker.github.io의 메시지</h4></div>
    <div class="modal-body">
      <p id="modalDesc">항목을 입력하세요</p>
      <input type="text" id="modalInput" class="modal-input">
    </div>
    <div class="modal-footer">
      <button class="btn-modal-confirm" id="modalConfirmBtn">확인</button>
      <button class="btn-modal-cancel" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="main-header">
    <h1>Prompt Studio Pro</h1>
    <p>고품질 프롬프트를 위한 스마트 보관함</p>
  </div>

  <div class="main-side">
    <div class="card">
      <h3 class="section-title">작성 에디터 <span id="modeStatus" class="badge">새로 만들기</span></h3>
      
      <div class="input-row">
        <div class="field"><label>제목</label><input type="text" id="titleIn" placeholder="작업 제목을 입력하세요"></div>
        <div class="field"><label>AI 엔진</label>
          <div class="flex-input"><select id="aiSel"></select><button class="add-inline-btn" onclick="openModal('aiSel')">+</button></div>
        </div>
      </div>

      <div class="input-row">
        <div class="field"><label>용도 카테고리</label>
          <div class="flex-input"><select id="useSel"></select><button class="add-inline-btn" onclick="openModal('useSel')">+</button></div>
        </div>
        <div class="field"><label>톤앤매너</label><input type="text" id="toneIn" placeholder="예: 전문가처럼, 부드러운"></div>
      </div>

      <div class="field" style="margin-bottom:20px;">
        <label>추가 조건 및 제약사항</label>
        <div class="flex-input">
          <input type="text" id="customChipIn" placeholder="조건 입력 후 추가">
          <button class="add-inline-btn" onclick="addChip()">추가</button>
        </div>
        <div class="chip-container" id="chipBox"></div>
        <textarea id="detailIn" rows="4" style="margin-top:12px;" placeholder="구체적인 요청사항을 적어주세요."></textarea>
      </div>

      <label>최적화된 프롬프트 미리보기</label>
      <div class="result-box" id="resultOut"></div>

      <div class="btn-group">
        <button class="btn-main" id="saveBtn">보관함에 저장하기</button>
        <button class="btn-sub" id="resetBtn">입력 초기화</button>
      </div>
    </div>
  </div>

  <div class="archive-side">
    <div class="card">
      <h3 class="section-title">프롬프트 보관함</h3>
      <div class="filters"><select id="categoryFilter"></select><input type="text" id="searchIn" placeholder="검색..."></div>
      <div class="list-scroll" id="listBox"></div>
    </div>
  </div>
</div>

<div id="toast" class="toast">완료되었습니다!</div>

<script>
let savedData = [];
let aiOptions = ["ChatGPT", "Claude", "Gemini"];
let useOptions = ["글쓰기", "코딩", "기획", "이미지"];
let chips = ["핵심 요약", "단계별 설명", "초보자도 알기 쉽게"];
let editId = null;
let targetSelectId = '';

function init() {
  renderSelect('aiSel', aiOptions);
  renderSelect('useSel', useOptions);
  renderChips();
  renderList();
  updateResult();
}

/* 퀄리티 상향된 프롬프트 생성 로직 (Task/Constraint 구조) */
function updateResult() {
  const title = document.getElementById('titleIn').value.trim() || "(제목 없음)";
  const ai = document.getElementById('aiSel').value;
  const use = document.getElementById('useSel').value;
  const tone = document.getElementById('toneIn').value.trim() || "기본 톤";
  const detail = document.getElementById('detailIn').value.trim() || "추가 조건 없음";

  const promptText = `### [SYSTEM ROLE]
당신은 숙련된 ${use} 전문가이자 ${ai} 모델입니다.

### [TASK]
목표: ${title}
이 작업에 대해 전문적이고 체계적인 결과물을 생성해 주세요.

### [TONE & MANNER]
- 말투 및 분위기: ${tone}

### [CONSTRAINTS & DETAILS]
${detail}

---
위 조건에 맞춰 최상의 결과물을 도출해 주세요.`;

  document.getElementById('resultOut').textContent = promptText;
}

/* 초기화 함수 (모든 필드 완벽 대응) */
function resetFields() {
  const ids = ['titleIn', 'toneIn', 'detailIn', 'customChipIn', 'searchIn'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = '';
  });
  document.getElementById('aiSel').selectedIndex = 0;
  document.getElementById('useSel').selectedIndex = 0;
  editId = null;
  document.getElementById('modeStatus').textContent = '새로 만들기';
  updateResult();
}

/* 나머지 기능들 */
function openModal(id) {
  targetSelectId = id;
  document.getElementById('modalDesc').textContent = id === 'aiSel' ? '사용할 AI 이름을 입력해주세요.' : '분류 카테고리를 입력해주세요.';
  document.getElementById('categoryModal').classList.add('show');
  document.getElementById('modalInput').value = '';
  document.getElementById('modalInput').focus();
}

function closeModal() { document.getElementById('categoryModal').classList.remove('show'); }

document.getElementById('modalConfirmBtn').onclick = () => {
  const val = document.getElementById('modalInput').value.trim();
  if(val) {
    if(targetSelectId === 'aiSel') { if(!aiOptions.includes(val)) aiOptions.push(val); renderSelect('aiSel', aiOptions); }
    else { if(!useOptions.includes(val)) useOptions.push(val); renderSelect('useSel', useOptions); }
    document.getElementById(targetSelectId).value = val;
    updateResult();
  }
  closeModal();
};

function renderSelect(id, options) {
  document.getElementById(id).innerHTML = options.map(opt => `<option value="${opt}">${opt}</option>`).join('');
}

function renderChips() {
  document.getElementById('chipBox').innerHTML = chips.map(c => `<span class="chip" onclick="applyChip('${c}')">${c}</span>`).join('');
}

function applyChip(text) {
  const area = document.getElementById('detailIn');
  area.value += (area.value ? ', ' : '') + text;
  updateResult();
}

function addChip() {
  const input = document.getElementById('customChipIn');
  const val = input.value.trim();
  if(val) {
    if(!chips.includes(val)) chips.push(val);
    renderChips();
    input.value = ''; // 필드 비우기
  }
}

function renderList() {
  const box = document.getElementById('listBox');
  box.innerHTML = savedData.map(item => `
    <div class="archive-card">
      <div style="font-size:11px; color:#6366f1; font-weight:800; margin-bottom:8px;">${item.ai} · ${item.use}</div>
      <strong>${item.title}</strong>
      <div class="card-actions">
        <button class="action-btn action-load" onclick="loadItem(${item.id}, false)">불러오기</button>
        <button class="action-btn action-edit" onclick="loadItem(${item.id}, true)">수정</button>
        <button class="action-btn copy-btn" onclick="copyItem(${item.id})">복사</button>
        <button class="action-btn action-del" onclick="deleteItem(${item.id})">삭제</button>
      </div>
    </div>
  `).join('') || '<p style="text-align:center; color:#94a3b8; margin-top:40px;">저장된 프롬프트가 없습니다.</p>';
}

function loadItem(id, editMode) {
  const item = savedData.find(d => d.id === id);
  if(!item) return;
  document.getElementById('titleIn').value = item.title;
  document.getElementById('aiSel').value = item.ai;
  document.getElementById('useSel').value = item.use;
  document.getElementById('toneIn').value = item.tone || '';
  document.getElementById('detailIn').value = item.detail;
  editId = editMode ? id : null;
  document.getElementById('modeStatus').textContent = editMode ? '수정 중...' : '새로 만들기';
  updateResult();
}

function copyItem(id) {
  const item = savedData.find(d => d.id === id);
  if(!item) return;
  const area = document.createElement('textarea');
  document.body.appendChild(area);
  area.value = document.getElementById('resultOut').textContent;
  area.select();
  document.execCommand('copy');
  document.body.removeChild(area);
  showToast('복사 완료!');
}

function deleteItem(id) {
  if(!confirm('삭제하시겠습니까?')) return;
  savedData = savedData.filter(d => d.id !== id);
  renderList();
}

document.getElementById('saveBtn').onclick = () => {
  const title = document.getElementById('titleIn').value.trim();
  if(!title) return showToast('제목을 입력해주세요.');
  
  const data = { 
    id: editId || Date.now(), title, ai: document.getElementById('aiSel').value, 
    use: document.getElementById('useSel').value, tone: document.getElementById('toneIn').value, 
    detail: document.getElementById('detailIn').value 
  };
  
  if(editId) {
    const idx = savedData.findIndex(d => d.id === editId);
    savedData[idx] = data;
  } else {
    savedData.unshift(data);
  }
  
  renderList();
  resetFields();
  showToast('저장되었습니다.');
};

document.getElementById('resetBtn').onclick = resetFields;
['titleIn', 'toneIn', 'detailIn'].forEach(id => {
  document.getElementById(id).oninput = updateResult;
});
document.getElementById('aiSel').onchange = updateResult;
document.getElementById('useSel').onchange = updateResult;

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 1800);
}

init();
</script>
</body>
</html>

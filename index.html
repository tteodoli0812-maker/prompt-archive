<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프롬프트 스튜디오 프로</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

:root {
  --primary: #6366f1;
  --primary-hover: #4f46e5;
  --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
  --card-bg: rgba(255, 255, 255, 0.95);
  --text-main: #0f172a;
  --text-sub: #475569;
  --border: #e2e8f0;
  --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
}

* { box-sizing: border-box; font-family: 'Pretendard', sans-serif; transition: all 0.2s ease; }
body { margin: 0; background: var(--bg-gradient); color: var(--text-main); padding: 30px; height: 100vh; overflow: hidden; }

/* 메인 컨테이너: 화면 높이에 맞게 고정 */
.container { 
  max-width: 1400px; margin: 0 auto; display: grid; 
  grid-template-columns: 1fr 450px; gap: 30px; height: calc(100vh - 60px);
}

.card { 
  background: var(--card-bg); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.8);
  padding: 30px; box-shadow: var(--shadow); backdrop-filter: blur(10px);
  display: flex; flex-direction: column; overflow: hidden;
}

h3 { font-size: 22px; font-weight: 800; margin: 0 0 20px 0; display: flex; align-items: center; letter-spacing: -0.5px; }
h3::before { content: ''; display: inline-block; width: 5px; height: 22px; background: var(--primary); margin-right: 12px; border-radius: 10px; }

/* 입력 영역 스크롤 설정 */
.scroll-area { flex: 1; overflow-y: auto; padding-right: 10px; }
.scroll-area::-webkit-scrollbar { width: 6px; }
.scroll-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.field { display: flex; flex-direction: column; gap: 8px; }
label { font-size: 13px; font-weight: 700; color: var(--text-sub); margin-left: 2px; }

input, select, textarea { 
  width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); 
  border-radius: 14px; font-size: 14px; outline: none; background: #fff;
}
input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

.add-inline-btn { 
  padding: 0 20px; background: var(--primary); color: white; border: none; 
  border-radius: 14px; cursor: pointer; font-weight: 700; font-size: 14px; white-space: nowrap;
}
.add-inline-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }

.chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.chip { 
  padding: 8px 16px; background: #f1f5f9; color: var(--text-sub); 
  border-radius: 12px; font-size: 13px; cursor: pointer; font-weight: 600;
  border: 1.5px solid transparent;
}
.chip.active { background: var(--primary); color: white; border-color: var(--primary); }

.result-box { 
  background: #0f172a; color: #e2e8f0; padding: 25px; border-radius: 18px; 
  min-height: 350px; font-size: 14px; white-space: pre-wrap; margin-top: 20px; 
  line-height: 1.8; border-left: 6px solid var(--primary); font-family: 'Consolas', monospace;
}

.btn-group { display: flex; gap: 12px; margin-top: 25px; }
.btn-main { background: var(--primary); color: white; flex: 2; padding: 18px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; font-size: 16px; }
.btn-sub { background: #f1f5f9; color: var(--text-sub); flex: 1; padding: 18px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; }

/* 보관함 영역 디자인 */
.archive-filter-area { background: #f8fafc; padding: 20px; border-radius: 18px; margin-bottom: 20px; border: 1px solid var(--border); }
.filter-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

.list-scroll { flex: 1; overflow-y: auto; padding-right: 5px; }
.list-scroll::-webkit-scrollbar { width: 5px; }
.list-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

.archive-card { 
  width: 100%; padding: 20px; border: 1.5px solid var(--border); border-radius: 20px; 
  background: white; margin-bottom: 16px; position: relative;
}
.archive-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

.tag-group { display: flex; gap: 6px; margin-bottom: 12px; }
.tag { font-size: 10px; padding: 4px 10px; border-radius: 6px; background: #eef2ff; font-weight: 800; color: var(--primary); text-transform: uppercase; }

.card-actions { display: flex; gap: 8px; margin-top: 18px; }
.card-actions button { flex: 1; padding: 10px; font-size: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }

.edit-btn { background: #eef2ff; color: var(--primary); }
.copy-btn { background: #f1f5f9; color: var(--text-sub); border: 1px solid var(--border); }
.del-btn { background: #fef2f2; color: #ef4444; }

/* 모달 디자인 */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); }
.modal-overlay.show { display: flex; }
.modal { background: #1e293b; border-radius: 24px; width: 420px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
.modal-body { padding: 35px; }
.modal-input { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 15px; border-radius: 14px; outline: none; font-size: 16px; }
.modal-footer { padding: 20px 35px; display: flex; justify-content: flex-end; gap: 12px; background: #0f172a; }

#toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 14px 35px; border-radius: 16px; display: none; z-index: 2000; font-weight: 700; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
</style>
</head>
<body>

<div class="modal-overlay" id="customModal">
  <div class="modal">
    <div class="modal-body">
      <p id="mTitle" style="color:white; margin:0 0 20px 0; font-weight:800; font-size:20px;">항목 추가</p>
      <input type="text" id="mInput" class="modal-input" placeholder="이름을 입력하세요">
    </div>
    <div class="modal-footer">
      <button class="add-inline-btn" id="mConfirm">추가하기</button>
      <button class="add-inline-btn" style="background:#475569" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="card">
    <h3>프롬프트 제작 도구 <span id="modeLabel" style="font-size:11px; color:var(--primary); margin-left:10px; background:rgba(99,102,241,0.1); padding:3px 10px; border-radius:6px; font-weight:800;">[신규 작성]</span></h3>
    <div class="scroll-area">
      <div class="input-row">
        <div class="field"><label>핵심 주제</label><input type="text" id="titleIn" placeholder="해결하고 싶은 주제를 입력하세요"></div>
        <div class="field"><label>최적화 AI 엔진</label><div style="display:flex; gap:8px;"><select id="aiSel"></select><button class="add-inline-btn" onclick="openModal('aiSel')">+</button></div></div>
      </div>
      <div class="input-row">
        <div class="field"><label>전문 분야</label><div style="display:flex; gap:8px;"><select id="useSel"></select><button class="add-inline-btn" onclick="openModal('useSel')">+</button></div></div>
        <div class="field"><label>답변 톤앤매너</label><input type="text" id="toneIn" placeholder="예: 전문적이고 실용적인"></div>
      </div>
      <div class="field">
        <label>추가 조건 (선택 시 프롬프트에 자동 포함)</label>
        <div style="display:flex; gap:8px;"><input type="text" id="chipIn" placeholder="새로운 조건 키워드 입력"><button class="add-inline-btn" onclick="addChip()">추가</button></div>
        <div class="chip-container" id="chipBox"></div>
        <textarea id="detailIn" rows="4" style="margin-top:15px;" placeholder="그 외 상세한 요청사항이나 제약 조건을 자유롭게 입력하세요."></textarea>
      </div>
      <div class="result-box" id="resultOut"></div>
    </div>
    <div class="btn-group">
      <button class="btn-main" id="saveBtn">보관함에 저장 및 프롬프트 복사</button>
      <button class="btn-sub" onclick="resetForm()">초기화</button>
    </div>
  </div>

  <div class="card">
    <h3>프롬프트 보관함</h3>
    <div class="archive-filter-area">
      <div class="filter-row">
        <select id="aiFilter"></select>
        <select id="categoryFilter"></select>
      </div>
      <input type="text" id="searchIn" placeholder="저장된 제목이나 내용 검색...">
    </div>
    <div class="list-scroll" id="listBox"></div>
  </div>
</div>

<div id="toast">성공적으로 처리되었습니다!</div>

<script>
let savedData = [];
let aiOptions = ["ChatGPT-4o", "Claude-3.5-Sonnet", "Gemini-1.5-Pro"];
let useOptions = ["소프트웨어 개발", "기획 및 전략", "마케팅 콘텐츠", "데이터 인사이트"];
let chips = ["단계별 추론(CoT)", "클린 코드 원칙", "서론 생략(No Yapping)", "데이터 중심", "실행 가능한 예시"];
let activeChips = new Set();
let editId = null;
let currentTarget = '';

function init() { renderOptions(); renderChips(); renderFilterOptions(); renderList(); updatePreview(); }

function renderOptions() {
  document.getElementById('aiSel').innerHTML = aiOptions.map(v => `<option value="${v}">${v}</option>`).join('');
  document.getElementById('useSel').innerHTML = useOptions.map(v => `<option value="${v}">${v}</option>`).join('');
}

function renderFilterOptions() {
  document.getElementById('aiFilter').innerHTML = '<option value="all">모든 엔진</option>' + aiOptions.map(v => `<option value="${v}">${v}</option>`).join('');
  document.getElementById('categoryFilter').innerHTML = '<option value="all">모든 분야</option>' + useOptions.map(v => `<option value="${v}">${v}</option>`).join('');
}

function renderChips() {
  document.getElementById('chipBox').innerHTML = chips.map(c => 
    `<span class="chip ${activeChips.has(c) ? 'active' : ''}" onclick="toggleChip('${c}')">${c}</span>`
  ).join('');
}

function toggleChip(c) {
  if(activeChips.has(c)) activeChips.delete(c); else activeChips.add(c);
  renderChips(); updatePreview();
}

function addChip() {
  const i = document.getElementById('chipIn');
  if(i.value.trim()) { 
    chips.push(i.value.trim()); activeChips.add(i.value.trim());
    renderChips(); i.value = ''; updatePreview();
  }
}

function buildFullPrompt(data) {
  const cText = data.activeChips && data.activeChips.length > 0 ? data.activeChips.join(', ') : '기본 최적화';
  return `${cText}

[ 시스템 지시문: ${data.ai} 최적화 ]

당신은 최고의 "${data.use}" 전문가입니다. 사용자의 요청 "${data.title || '주제 미정'}"에 대해 아래의 사고 체계를 거쳐 답변하십시오.

1. 맥락 분석 (Context)
- 주제: ${data.title || '미지정'} / 분야: ${data.use}

2. 사고 과정 (Thinking Process)
- 의도를 정밀 분석하고, 전문적인 지식에 근거해 논리적 단계를 구성하십시오.
- 답변 톤: "${data.tone || '전문적이고 객관적인'}" 상태를 유지하십시오.

3. 제약 및 요구 사항 (Constraints)
- 적용된 특수 조건: ${cText}
- 상세 지시: ${data.detail || '상세 내용 없음'}
- 답변 구조: 마크다운 형식을 활용해 가독성을 높이고, 불필요한 서론은 제외하십시오.

"위의 지침을 바탕으로 가장 전문적이고 완벽한 결과물을 도출하십시오."`;
}

function updatePreview() {
  const data = {
    ai: document.getElementById('aiSel').value,
    use: document.getElementById('useSel').value,
    title: document.getElementById('titleIn').value,
    tone: document.getElementById('toneIn').value,
    detail: document.getElementById('detailIn').value,
    activeChips: Array.from(activeChips)
  };
  document.getElementById('resultOut').textContent = buildFullPrompt(data);
}

function renderList() {
  const kw = document.getElementById('searchIn').value.toLowerCase();
  const aiF = document.getElementById('aiFilter').value;
  const useF = document.getElementById('categoryFilter').value;
  const box = document.getElementById('listBox');
  box.innerHTML = '';

  const filtered = savedData.filter(d => {
    const matchKw = d.title.toLowerCase().includes(kw);
    return matchKw && (aiF === 'all' || d.ai === aiF) && (useF === 'all' || d.use === useF);
  });

  if(filtered.length === 0) {
    box.innerHTML = '<div style="text-align:center; padding:60px 0; color:#94a3b8; font-size:14px;">저장된 내역이 없습니다.</div>';
    return;
  }

  filtered.forEach(item => {
    const div = document.createElement('div');
    div.className = 'archive-card';
    div.innerHTML = `
      <div class="tag-group"><span class="tag">${item.ai}</span><span class="tag">${item.use}</span></div>
      <strong style="display:block; font-size:16px; margin-bottom:8px;">${item.title}</strong>
      <div class="card-actions">
        <button class="edit-btn" onclick="startEdit(${item.id})">수정하기</button>
        <button class="copy-btn" onclick="copyItem(${item.id})">복사</button>
        <button class="del-btn" onclick="deleteItem(${item.id})">삭제</button>
      </div>
    `;
    box.appendChild(div);
  });
}

function startEdit(id) {
  const item = savedData.find(d => d.id === id);
  if(!item) return;
  editId = id;
  document.getElementById('modeLabel').textContent = "[수정 모드]";
  document.getElementById('titleIn').value = item.title;
  document.getElementById('aiSel').value = item.ai;
  document.getElementById('useSel').value = item.use;
  document.getElementById('toneIn').value = item.tone;
  document.getElementById('detailIn').value = item.detail;
  activeChips = new Set(item.activeChips);
  renderChips(); updatePreview();
  showToast('데이터를 불러왔습니다.');
}

function copyItem(id) {
  let text = "";
  if (id) {
    const item = savedData.find(d => d.id === id);
    if (item) text = buildFullPrompt(item);
  } else {
    text = document.getElementById('resultOut').textContent;
  }
  navigator.clipboard.writeText(text);
  showToast('프롬프트가 복사되었습니다!');
}

document.getElementById('saveBtn').onclick = () => {
  const title = document.getElementById('titleIn').value;
  if(!title) return alert('주제를 입력해야 저장할 수 있습니다.');
  
  const obj = { 
    id: editId || Date.now(), title, ai: document.getElementById('aiSel').value, 
    use: document.getElementById('useSel').value, tone: document.getElementById('toneIn').value, 
    detail: document.getElementById('detailIn').value,
    activeChips: Array.from(activeChips)
  };

  if(editId) {
    const idx = savedData.findIndex(d => d.id === editId);
    savedData[idx] = obj;
  } else {
    savedData.unshift(obj);
  }
  
  copyItem(); resetForm(); renderList();
};

function resetForm() {
  document.getElementById('titleIn').value = ''; document.getElementById('toneIn').value = ''; document.getElementById('detailIn').value = '';
  activeChips.clear(); editId = null; 
  document.getElementById('modeLabel').textContent = "[신규 작성]";
  renderChips(); updatePreview();
}

function openModal(type) { currentTarget = type; document.getElementById('mTitle').textContent = type === 'aiSel' ? '신규 AI 엔진 추가' : '새로운 분야 추가'; document.getElementById('customModal').classList.add('show'); }
function closeModal() { document.getElementById('customModal').classList.remove('show'); document.getElementById('mInput').value = ''; }

document.getElementById('mConfirm').onclick = () => {
  const val = document.getElementById('mInput').value.trim();
  if(!val) return;
  if(currentTarget === 'aiSel') aiOptions.push(val); else useOptions.push(val);
  renderOptions(); renderFilterOptions(); document.getElementById(currentTarget).value = val; updatePreview(); closeModal();
};

function deleteItem(id) { if(confirm('이 프롬프트를 삭제하시겠습니까?')) { savedData = savedData.filter(d => d.id !== id); renderList(); } }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 2000); }

document.getElementById('searchIn').oninput = renderList;
document.getElementById('aiFilter').onchange = renderList;
document.getElementById('categoryFilter').onchange = renderList;
['titleIn', 'aiSel', 'useSel', 'toneIn', 'detailIn'].forEach(id => document.getElementById(id).oninput = updatePreview);

init();
</script>
</body>
</html>

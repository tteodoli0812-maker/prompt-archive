<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Archive</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --line: #e6e8ee;
      --text: #111827;
      --sub: #6b7280;
      --blue: #2563eb;
      --blue-soft: #eff6ff;
      --green: #16a34a;
      --green-soft: #f0fdf4;
      --gray-soft: #f8fafc;
    }
    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 22px 16px 40px;
    }
    .topbar { margin-bottom: 16px; }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: #111827;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
    }
    .brand h1 {
      margin: 0;
      font-size: 24px;
    }
    .brand p {
      margin: 2px 0 0;
      font-size: 13px;
      color: var(--sub);
    }
    .hero, .section, .panel, .prompt-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
    }
    .hero {
      padding: 20px;
      margin-bottom: 14px;
    }
    .hero h2 {
      margin: 0 0 6px;
      font-size: 24px;
    }
    .hero p {
      margin: 0;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.6;
    }
    .guide-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .guide-pill {
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--line);
      background: #fff;
    }
    .guide-pill.blue { background: var(--blue-soft); color: var(--blue); border-color: #bfdbfe; }
    .guide-pill.green { background: var(--green-soft); color: var(--green); border-color: #bbf7d0; }
    .guide-pill.gray { background: var(--gray-soft); color: #475569; }
    .section {
      padding: 16px;
      margin-bottom: 14px;
    }
    .section-header {
      margin-bottom: 12px;
    }
    .section-header h3 {
      margin: 0;
      font-size: 18px;
    }
    .section-header p {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--sub);
    }
    .controls {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .field {
      border-radius: 14px;
      padding: 10px;
      background: var(--gray-soft);
      border: 1px solid var(--line);
    }
    .field.editable {
      background: var(--blue-soft);
      border-color: #bfdbfe;
    }
    .field-label {
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 7px;
      color: #475569;
    }
    .field.editable .field-label { color: var(--blue); }
    input, select, textarea {
      width: 100%;
      border: 1px solid #d6dbe4;
      border-radius: 12px;
      padding: 12px 13px;
      font-size: 14px;
      background: white;
      outline: none;
      font-family: inherit;
    }
    textarea {
      min-height: 150px;
      resize: vertical;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .builder-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .panel {
      padding: 14px;
    }
    .panel.editable {
      background: var(--blue-soft);
      border-color: #bfdbfe;
    }
    .panel.result {
      background: #fbfcfe;
    }
    .panel-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }
    .panel-top h4 {
      margin: 0;
      font-size: 16px;
    }
    .mini-badge {
      font-size: 11px;
      font-weight: 800;
      padding: 5px 8px;
      border-radius: 999px;
    }
    .mini-badge.editable { background: #dbeafe; color: var(--blue); }
    .mini-badge.result { background: #e5e7eb; color: #475569; }
    .mini-badge.clickable { background: #dcfce7; color: #15803d; }
    .action-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .use-btn {
      background: var(--green);
      color: white;
    }
    .ghost {
      background: #f3f4f6;
      color: var(--text);
    }
    .primary {
      background: var(--blue);
      color: white;
    }
    .soft {
      background: var(--blue-soft);
      color: var(--blue);
    }
    .result-box {
      min-height: 150px;
      border-radius: 14px;
      background: #111827;
      color: white;
      padding: 14px;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .groups {
      display: grid;
      gap: 16px;
    }
    .group {
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }
    .group:first-child {
      border-top: none;
      padding-top: 0;
    }
    .group-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 15px;
      font-weight: 700;
    }
    .folder-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #94a3b8;
    }
    .prompt-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .prompt-card {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .prompt-card h4 {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
    }
    .pill {
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: var(--gray-soft);
      color: #4b5563;
      white-space: nowrap;
    }
    .prompt-preview {
      background: var(--gray-soft);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px;
      font-size: 13px;
      color: #4b5563;
      min-height: 74px;
      white-space: pre-wrap;
    }
    .status {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #111827;
      color: white;
      padding: 11px 13px;
      border-radius: 12px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      transition: .2s ease;
      pointer-events: none;
    }
    .status.show {
      opacity: 1;
      transform: translateY(0);
    }
    @media (max-width: 920px) {
      .controls, .prompt-grid, .builder-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 720px) {
      .controls, .prompt-grid, .builder-grid {
        grid-template-columns: 1fr;
      }
      .hero h2 { font-size: 22px; }
      .brand h1 { font-size: 21px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <div class="logo">P</div>
        <div>
          <h1>Prompt Archive</h1>
          <p>만들기 · 정리 · 복사</p>
        </div>
      </div>
    </header>

    <section class="hero">
      <h2>나만의 프롬프트를 만들고 모아두기</h2>
      <p>직접 프롬프트를 만들고, 카테고리별로 정리해서 한눈에 볼 수 있습니다.</p>
      <div class="guide-row">
        <div class="guide-pill blue">수정 가능</div>
        <div class="guide-pill green">클릭 가능</div>
        <div class="guide-pill gray">결과 보기</div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h3>새 프롬프트 만들기</h3>
      </div>
      <div class="builder-grid">
        <div class="panel editable">
          <div class="panel-top">
            <h4>입력</h4>
            <span class="mini-badge editable">수정 가능</span>
          </div>
          <div class="controls" style="grid-template-columns: 1fr 1fr; margin-bottom: 10px;">
            <div class="field editable">
              <div class="field-label">제목</div>
              <input id="titleInput" type="text" placeholder="예: 발표문 작성" />
            </div>
            <div class="field editable">
              <div class="field-label">카테고리</div>
              <select id="categoryInput">
                <option value="글쓰기">글쓰기</option>
                <option value="기획/분석">기획/분석</option>
                <option value="코딩">코딩</option>
                <option value="이미지">이미지</option>
              </select>
            </div>
          </div>
          <textarea id="editor" placeholder="프롬프트 내용을 직접 입력하세요"></textarea>
          <div class="action-row">
            <button class="primary" id="improveBtn">자동 정리</button>
            <button class="use-btn" id="saveBtn">보관함에 추가</button>
            <button class="ghost" id="copyRawBtn">원문 복사</button>
          </div>
        </div>

        <div class="panel result">
          <div class="panel-top">
            <h4>결과</h4>
            <span class="mini-badge result">읽기 전용</span>
          </div>
          <div class="result-box" id="resultBox"></div>
          <div class="action-row">
            <button class="soft" id="copyResultBtn">정리본 복사</button>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h3>프롬프트 보관함</h3>
        <p>같은 카테고리끼리 묶어서 볼 수 있습니다.</p>
      </div>

      <div class="controls">
        <div class="field editable">
          <div class="field-label">검색</div>
          <input id="searchInput" type="text" placeholder="프롬프트 검색" />
        </div>
        <div class="field editable">
          <div class="field-label">카테고리 보기</div>
          <select id="typeFilter">
            <option value="all">전체 보기</option>
            <option value="글쓰기">글쓰기</option>
            <option value="기획/분석">기획/분석</option>
            <option value="코딩">코딩</option>
            <option value="이미지">이미지</option>
          </select>
        </div>
      </div>

      <div class="groups" id="groupContainer"></div>
    </section>
  </div>

  <div class="status" id="statusToast">완료!</div>

  <script>
    const promptData = [
      { title: '발표문 작성', category: '글쓰기', prompt: '발표문 써줘. 너무 딱딱하지 않게, 학생이 직접 발표하는 자연스러운 말투로 써줘.' },
      { title: '에세이 초안', category: '글쓰기', prompt: '에세이 초안을 써줘. 문단 구분 없이 자연스럽게 이어지게 작성해줘.' },
      { title: '디자인 문제 분석', category: '기획/분석', prompt: '이 디자인 문제를 분석해줘. 사용자의 불편, 원인, 개선 방향을 중심으로 정리해줘.' },
      { title: 'PPT 흐름 구성', category: '기획/분석', prompt: '5분 발표용 PPT 흐름을 짜줘. 도입, 핵심 내용, 결론 순서로 슬라이드별 내용을 정리해줘.' },
      { title: '웹 UI 코드 요청', category: '코딩', prompt: '심플한 HTML/CSS/JS 페이지 코드를 짜줘. 클릭 가능한 요소와 편집 가능한 영역이 한눈에 보이게 해줘.' },
      { title: '이미지 생성 프롬프트', category: '이미지', prompt: 'minimal editorial poster, soft gray background, clean typography, balanced layout, subtle lighting, modern aesthetic' }
    ];

    const titleInput = document.getElementById('titleInput');
    const categoryInput = document.getElementById('categoryInput');
    const editor = document.getElementById('editor');
    const resultBox = document.getElementById('resultBox');
    const searchInput = document.getElementById('searchInput');
    const typeFilter = document.getElementById('typeFilter');
    const groupContainer = document.getElementById('groupContainer');
    const statusToast = document.getElementById('statusToast');

    function showToast(message) {
      statusToast.textContent = message;
      statusToast.classList.add('show');
      setTimeout(() => statusToast.classList.remove('show'), 1200);
    }

    function improvePrompt(text) {
      const clean = text.trim().replace(/\s+/g, ' ');
      return [
        '역할: 요청을 더 구체적으로 정리하는 프롬프트 도우미',
        '목표: 원하는 결과가 더 분명하게 나오도록 정리',
        `요청: ${clean}`,
        '조건: 대상, 상황, 말투, 구성 포함',
        '출력 형식: 바로 사용할 수 있는 완성형 프롬프트'
      ].join('\n');
    }

    function refreshResult() {
      resultBox.textContent = improvePrompt(editor.value || '');
    }

    function groupByCategory(items) {
      const map = {};
      items.forEach(item => {
        if (!map[item.category]) map[item.category] = [];
        map[item.category].push(item);
      });
      return map;
    }

    function renderGroups() {
      const keyword = (searchInput.value || '').trim().toLowerCase();
      const filter = typeFilter.value;
      const filtered = promptData.filter(item => {
        const matchKeyword = !keyword || `${item.title} ${item.prompt}`.toLowerCase().includes(keyword);
        const matchType = filter === 'all' || item.category === filter;
        return matchKeyword && matchType;
      });

      const grouped = groupByCategory(filtered);
      groupContainer.innerHTML = '';

      Object.keys(grouped).forEach(category => {
        const group = document.createElement('div');
        group.className = 'group';

        const cards = grouped[category].map(item => `
          <div class="prompt-card">
            <div class="card-top">
              <h4>${item.title}</h4>
              <span class="pill">${item.category}</span>
            </div>
            <div class="prompt-preview">${item.prompt}</div>
            <div class="action-row">
              <button class="use-btn" data-title="${item.title.replace(/"/g, '&quot;')}" data-category="${item.category}" data-prompt="${item.prompt.replace(/"/g, '&quot;')}">불러오기</button>
              <button class="ghost copy-btn" data-copy="${item.prompt.replace(/"/g, '&quot;')}">복사</button>
            </div>
          </div>
        `).join('');

        group.innerHTML = `
          <div class="group-title"><span class="folder-dot"></span>${category}</div>
          <div class="prompt-grid">${cards}</div>
        `;
        groupContainer.appendChild(group);
      });

      groupContainer.querySelectorAll('.use-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          titleInput.value = btn.dataset.title;
          categoryInput.value = btn.dataset.category;
          editor.value = btn.dataset.prompt;
          refreshResult();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });

      groupContainer.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          await navigator.clipboard.writeText(btn.dataset.copy);
          showToast('복사 완료!');
        });
      });
    }

    document.getElementById('improveBtn').addEventListener('click', refreshResult);

    document.getElementById('saveBtn').addEventListener('click', () => {
      const title = titleInput.value.trim();
      const category = categoryInput.value;
      const prompt = editor.value.trim();

      if (!title || !prompt) {
        showToast('제목과 내용을 입력하세요');
        return;
      }

      promptData.unshift({ title, category, prompt });
      titleInput.value = '';
      editor.value = '';
      resultBox.textContent = '';
      renderGroups();
      showToast('보관함에 추가됨');
    });

    document.getElementById('copyRawBtn').addEventListener('click', async () => {
      await navigator.clipboard.writeText(editor.value || '');
      showToast('원문 복사 완료!');
    });

    document.getElementById('copyResultBtn').addEventListener('click', async () => {
      await navigator.clipboard.writeText(resultBox.textContent || '');
      showToast('정리본 복사 완료!');
    });

    searchInput.addEventListener('input', renderGroups);
    typeFilter.addEventListener('change', renderGroups);
    editor.addEventListener('input', refreshResult);

    titleInput.value = '새 프롬프트';
    editor.value = '원하는 프롬프트 내용을 직접 입력하세요.';
    refreshResult();
    renderGroups();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Archive</title>
<style>
*{box-sizing:border-box}
:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --line:#e5e7eb;
  --text:#111827;
  --sub:#6b7280;
  --primary:#2563eb;
  --primary-soft:#eff6ff;
  --soft:#f8fafc;
  --dark:#111827;
  --danger:#dc2626;
  --danger-soft:#fef2f2;
}
body{
  margin:0;
  font-family:Pretendard,"Noto Sans KR",sans-serif;
  background:var(--bg);
  color:var(--text);
}
.wrap{
  max-width:1240px;
  margin:0 auto;
  padding:28px 18px 48px;
}
.header{
  margin-bottom:18px;
}
.header h1{
  margin:0;
  font-size:30px;
  letter-spacing:-0.03em;
}
.header p{
  margin:8px 0 0;
  color:var(--sub);
  font-size:14px;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:20px;
  padding:20px;
  margin-bottom:16px;
}
.hero{
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:14px;
  align-items:start;
}
.hero-main h2{
  margin:0 0 8px;
  font-size:26px;
  line-height:1.25;
  letter-spacing:-0.03em;
}
.hero-main p{
  margin:0;
  color:var(--sub);
  font-size:14px;
  line-height:1.7;
}
.hero-mini{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:flex-end;
}
.mini-chip{
  padding:8px 10px;
  border-radius:999px;
  background:var(--soft);
  border:1px solid var(--line);
  font-size:12px;
  font-weight:700;
  color:#475569;
}
.section-title{
  margin:0 0 14px;
  font-size:18px;
  font-weight:700;
}
.app-layout{
  display:grid;
  grid-template-columns:1.05fr .95fr;
  gap:16px;
  align-items:start;
}
.stack{display:grid; gap:16px;}
.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.field{
  background:var(--soft);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
}
.field strong{
  display:block;
  font-size:12px;
  margin-bottom:8px;
}
input, textarea, select{
  width:100%;
  border:1px solid #d6dbe4;
  border-radius:12px;
  padding:12px 13px;
  font-size:14px;
  background:white;
  outline:none;
  font-family:inherit;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(37,99,235,0.08);
}
textarea{
  min-height:92px;
  resize:vertical;
}
.chips{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}
.chip{
  border:none;
  border-radius:999px;
  padding:8px 11px;
  background:#eef2f7;
  color:#374151;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
}
.chip:hover{background:#dbeafe;color:#1d4ed8;}
.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}
button{
  border:none;
  border-radius:12px;
  padding:11px 14px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
}
.primary{background:var(--primary);color:#fff;}
.dark{background:var(--dark);color:#fff;}
.soft-btn{background:#eef2f7;color:#111827;}
.danger-btn{background:var(--danger-soft); color:var(--danger);}
.result-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}
.panel{
  border:1px solid var(--line);
  border-radius:16px;
  overflow:hidden;
  background:#fff;
}
.panel-head{
  padding:13px 14px;
  border-bottom:1px solid var(--line);
  background:var(--soft);
  font-size:14px;
  font-weight:700;
}
.panel-body{
  padding:14px;
  min-height:170px;
  white-space:pre-wrap;
  font-size:14px;
  line-height:1.7;
}
.panel-body.dark{
  background:#111827;
  color:#f9fafb;
}
.view-toggle{
  display:flex;
  gap:8px;
  margin-bottom:14px;
}
.tab{
  border:none;
  background:#eef2f7;
  color:#475569;
  padding:9px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
}
.tab.active{background:#dbeafe;color:#1d4ed8;}
.toolbar{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}
.library-layout{
  display:grid;
  grid-template-columns:.92fr 1.08fr;
  gap:14px;
}
.groups{display:grid; gap:16px;}
.group{
  border-top:1px solid var(--line);
  padding-top:12px;
}
.group:first-child{
  border-top:none;
  padding-top:0;
}
.group-title{
  font-size:15px;
  font-weight:700;
  margin-bottom:10px;
}
.file-list{display:grid; gap:10px;}
.file-item{
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  background:#fff;
  cursor:pointer;
  transition:.15s ease;
}
.file-item:hover{
  border-color:#cbd5e1;
  background:#fafcff;
}
.file-item.active{
  border-color:#93c5fd;
  background:#eff6ff;
}
.file-top strong{
  display:block;
  font-size:14px;
  margin-bottom:6px;
}
.meta{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:8px;
}
.pill{
  padding:5px 8px;
  border-radius:999px;
  background:#eef2f7;
  color:#475569;
  font-size:11px;
  font-weight:700;
}
.preview{
  font-size:13px;
  color:var(--sub);
  line-height:1.6;
}
.preview-empty{color:var(--sub);}
.small-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:14px;
}
.small-actions button{
  padding:9px 11px;
  font-size:12px;
}
.status{
  position:fixed;
  right:20px;
  bottom:20px;
  background:#111827;
  color:#fff;
  padding:11px 14px;
  border-radius:12px;
  font-size:13px;
  opacity:0;
  transform:translateY(8px);
  transition:.2s ease;
  pointer-events:none;
}
.status.show{opacity:1;transform:translateY(0);}
@media (max-width:980px){
  .hero,.app-layout,.grid-2,.toolbar,.library-layout{grid-template-columns:1fr;}
  .hero-mini{justify-content:flex-start;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Prompt Archive</h1>
    <p>짧게 입력하고, 정리된 프롬프트로 바로 바꾸고, AI별·용도별로 모아두는 공간</p>
  </div>

  <div class="card hero">
    <div class="hero-main">
      <h2>짧게 적고 바로 쓰는 프롬프트 정리 공간</h2>
      <p>핵심만 넣으면 바로 쓸 수 있는 형태로 정리되고, 저장한 프롬프트는 파일처럼 눌러서 다시 확인하고 수정할 수 있습니다.</p>
    </div>
    <div class="hero-mini">
      <div class="mini-chip">빠른 입력</div>
      <div class="mini-chip">자동 정리</div>
      <div class="mini-chip">분류 보관</div>
    </div>
  </div>

  <div class="app-layout">
    <div class="stack">
      <div class="card">
        <h3 class="section-title">빠른 입력</h3>

        <div class="grid-2">
          <div class="field">
            <strong>제목</strong>
            <input id="topicInput" placeholder="예: 발표문, 기획안, HTML 코드, 이미지 프롬프트">
          </div>
          <div class="field">
            <strong>어떤 AI에 쓸 건가요?</strong>
            <input id="aiInput" list="aiOptions" placeholder="예: ChatGPT">
            <datalist id="aiOptions"></datalist>
          </div>
        </div>

        <div class="grid-2" style="margin-top:12px;">
          <div class="field">
            <strong>용도</strong>
            <input id="useInput" list="useOptions" placeholder="예: 글쓰기">
            <datalist id="useOptions"></datalist>
          </div>
          <div class="field">
            <strong>원하는 느낌</strong>
            <input id="toneInput" placeholder="예: 자연스럽게, 간단하게, 전문적으로">
          </div>
        </div>

        <div class="field" style="margin-top:12px;">
          <strong>추가 조건</strong>
          <textarea id="detailInput" placeholder="예: 3분 발표용, 학생 말투, 도입-본론-결론 구조"></textarea>
          <div class="chips">
            <button class="chip" data-add="자연스러운 말투">자연스러운 말투</button>
            <button class="chip" data-add="짧고 명확하게">짧고 명확하게</button>
            <button class="chip" data-add="도입-본론-결론">도입-본론-결론</button>
            <button class="chip" data-add="학생 발표용">학생 발표용</button>
            <button class="chip" data-add="복붙해서 바로 사용 가능하게">바로 사용 가능</button>
            <button class="chip" data-add="예시 포함">예시 포함</button>
          </div>
        </div>

        <div class="actions">
          <button class="primary" id="generateBtn">프롬프트 정리하기</button>
          <button class="dark" id="saveBtn">보관함에 저장</button>
          <button class="soft-btn" id="resetBtn">초기화</button>
        </div>
      </div>

      <div class="card">
        <h3 class="section-title">정리된 결과</h3>
        <div class="result-grid">
          <div class="panel">
            <div class="panel-head">입력 요약</div>
            <div class="panel-body" id="summaryBox"></div>
          </div>
          <div class="panel">
            <div class="panel-head">완성된 프롬프트</div>
            <div class="panel-body dark" id="resultBox"></div>
          </div>
        </div>
        <div class="actions">
          <button class="primary" id="copyBtn">정리본 복사</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h3 class="section-title">저장된 프롬프트</h3>

      <div class="view-toggle">
        <button class="tab active" data-group="use">용도별 보기</button>
        <button class="tab" data-group="ai">AI별 보기</button>
      </div>

      <div class="toolbar">
        <input id="searchInput" placeholder="검색">
        <select id="aiFilter"></select>
        <select id="useFilter"></select>
      </div>

      <div class="library-layout">
        <div class="groups" id="groups"></div>
        <div class="panel preview-panel">
          <div class="panel-head">파일 보기</div>
          <div class="panel-body" id="filePreview">
            <div class="preview-empty">왼쪽에서 프롬프트를 눌러 내용을 확인하세요.</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="status" id="toast">완료!</div>

<script>
const topicInput = document.getElementById('topicInput');
const aiInput = document.getElementById('aiInput');
const useInput = document.getElementById('useInput');
const toneInput = document.getElementById('toneInput');
const detailInput = document.getElementById('detailInput');
const summaryBox = document.getElementById('summaryBox');
const resultBox = document.getElementById('resultBox');
const groups = document.getElementById('groups');
const filePreview = document.getElementById('filePreview');
const searchInput = document.getElementById('searchInput');
const aiFilter = document.getElementById('aiFilter');
const useFilter = document.getElementById('useFilter');
const aiOptions = document.getElementById('aiOptions');
const useOptions = document.getElementById('useOptions');
const toast = document.getElementById('toast');

let groupMode = 'use';
let selectedIndex = null;
let editingIndex = null;

let savedPrompts = [
  { title:'발표문', ai:'ChatGPT', use:'글쓰기', tone:'자연스럽게', detail:'학생 발표용, 도입-본론-결론 구조', result:'' },
  { title:'기획안', ai:'Claude', use:'기획/분석', tone:'간단하게', detail:'핵심만 요약해서', result:'' },
  { title:'웹 코드', ai:'Gemini', use:'코딩', tone:'심플하게', detail:'HTML/CSS/JS만 사용', result:'' },
  { title:'포스터 이미지', ai:'Midjourney', use:'이미지', tone:'미니멀하게', detail:'soft gray background, clean layout', result:'' }
];

function showToast(message){
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(()=> toast.classList.remove('show'), 1400);
}

function buildPrompt(title, ai, use, tone, detail){
  const safeTitle = title || '원하는 작업';
  const safeAi = ai || 'ChatGPT';
  const safeUse = use || '글쓰기';
  const safeTone = tone || '명확하고 자연스럽게';
  const safeDetail = detail || '필요한 조건을 적절히 반영해서';

  const resultFormat = {
    '글쓰기':'읽기 쉬운 문단 또는 구조화된 글',
    '기획/분석':'핵심 항목이 정리된 분석/기획안',
    '코딩':'바로 붙여넣기 가능한 코드 또는 단계 설명',
    '이미지':'바로 사용 가능한 이미지 생성 프롬프트'
  };

  return [
    `당신은 ${safeAi}에서 사용할 ${safeUse} 작업 도우미입니다.`,
    `목표: ${safeTitle}에 맞는 결과를 바로 활용할 수 있는 형태로 작성합니다.`,
    `톤: ${safeTone}.`,
    `추가 조건: ${safeDetail}.`,
    `출력 형식: ${resultFormat[safeUse] || '정리된 결과'}.`
  ].join('\n');
}

function refreshFilterOptions(){
  const aiValues = ['all', ...new Set(savedPrompts.map(item => item.ai).filter(Boolean))];
  const useValues = ['all', ...new Set(savedPrompts.map(item => item.use).filter(Boolean))];

  aiFilter.innerHTML = aiValues.map(v => `<option value="${v}">${v === 'all' ? '모든 AI' : v}</option>`).join('');
  useFilter.innerHTML = useValues.map(v => `<option value="${v}">${v === 'all' ? '모든 용도' : v}</option>`).join('');
  aiOptions.innerHTML = aiValues.filter(v => v !== 'all').map(v => `<option value="${v}"></option>`).join('');
  useOptions.innerHTML = useValues.filter(v => v !== 'all').map(v => `<option value="${v}"></option>`).join('');
}

function renderOutput(){
  const title = topicInput.value.trim();
  const ai = aiInput.value.trim();
  const use = useInput.value.trim();
  const tone = toneInput.value.trim();
  const detail = detailInput.value.trim();

  summaryBox.textContent = [
    `주제: ${title || '-'}`,
    `AI: ${ai || '-'}`,
    `용도: ${use || '-'}`,
    `느낌: ${tone || '-'}`,
    `조건: ${detail || '-'}`
  ].join('\n');

  resultBox.textContent = buildPrompt(title, ai, use, tone, detail);
}

function fillEditor(item){
  topicInput.value = item.title;
  aiInput.value = item.ai;
  useInput.value = item.use;
  toneInput.value = item.tone;
  detailInput.value = item.detail;
  renderOutput();
}

function renderPreview(item){
  if(!item){
    filePreview.innerHTML = '<div class="preview-empty">왼쪽에서 프롬프트를 눌러 내용을 확인하세요.</div>';
    return;
  }

  filePreview.innerHTML = `
    <strong style="display:block;font-size:16px;margin-bottom:8px;">${item.title}</strong>
    <div class="meta" style="margin-bottom:10px;">
      <span class="pill">${item.ai}</span>
      <span class="pill">${item.use}</span>
      <span class="pill">${item.tone || '-'}</span>
    </div>
    <div class="preview" style="margin-bottom:12px;">${item.detail || '-'}</div>
    <div style="border:1px solid var(--line); border-radius:14px; background:#111827; color:#fff; padding:14px; white-space:pre-wrap; font-size:13px; line-height:1.7;">${item.result}</div>
    <div class="small-actions">
      <button class="soft-btn" id="previewLoadBtn">불러오기</button>
      <button class="soft-btn" id="previewEditBtn">수정</button>
      <button class="primary" id="previewCopyBtn">복사</button>
      <button class="danger-btn" id="previewDeleteBtn">삭제</button>
    </div>
  `;

  document.getElementById('previewLoadBtn').onclick = () => {
    fillEditor(item);
    showToast('불러오기 성공!');
  };

  document.getElementById('previewEditBtn').onclick = () => {
    fillEditor(item);
    editingIndex = selectedIndex;
    showToast('수정할 수 있게 불러왔어요');
  };

  document.getElementById('previewCopyBtn').onclick = async () => {
    await navigator.clipboard.writeText(item.result);
    showToast('복사 완료!');
  };

  document.getElementById('previewDeleteBtn').onclick = () => {
    savedPrompts.splice(selectedIndex, 1);
    if(savedPrompts.length === 0){
      selectedIndex = null;
      editingIndex = null;
    } else {
      selectedIndex = Math.max(0, selectedIndex - 1);
      if(editingIndex !== null && editingIndex >= savedPrompts.length) editingIndex = null;
    }
    refreshFilterOptions();
    renderSaved();
    showToast('삭제 완료!');
  };
}

function groupItems(items, mode){
  const map = {};
  items.forEach(item => {
    const key = mode === 'ai' ? item.ai : item.use;
    if(!map[key]) map[key] = [];
    map[key].push(item);
  });
  return map;
}

function renderSaved(){
  const keyword = searchInput.value.trim().toLowerCase();
  const filtered = savedPrompts.filter(item => {
    const matchesKeyword = !keyword || `${item.title} ${item.detail} ${item.result} ${item.ai} ${item.use}`.toLowerCase().includes(keyword);
    const matchesAi = aiFilter.value === 'all' || item.ai === aiFilter.value;
    const matchesUse = useFilter.value === 'all' || item.use === useFilter.value;
    return matchesKeyword && matchesAi && matchesUse;
  });

  const grouped = groupItems(filtered, groupMode);
  groups.innerHTML = '';

  if(!filtered.length){
    groups.innerHTML = '<div class="file-item"><div class="preview">저장된 프롬프트가 없습니다.</div></div>';
    renderPreview(null);
    return;
  }

  if(selectedIndex === null || !savedPrompts[selectedIndex] || !filtered.includes(savedPrompts[selectedIndex])){
    selectedIndex = savedPrompts.indexOf(filtered[0]);
  }

  Object.keys(grouped).forEach(groupName => {
    const section = document.createElement('div');
    section.className = 'group';

    const itemsHtml = grouped[groupName].map(item => {
      const realIndex = savedPrompts.indexOf(item);
      return `
        <div class="file-item ${realIndex === selectedIndex ? 'active' : ''}" data-index="${realIndex}">
          <div class="file-top">
            <div>
              <strong>${item.title}</strong>
              <div class="meta">
                <span class="pill">${item.ai}</span>
                <span class="pill">${item.use}</span>
              </div>
              <div class="preview">${item.detail || '-'}</div>
            </div>
          </div>
        </div>
      `;
    }).join('');

    section.innerHTML = `
      <div class="group-title">${groupName}</div>
      <div class="file-list">${itemsHtml}</div>
    `;

    groups.appendChild(section);
  });

  document.querySelectorAll('.file-item[data-index]').forEach(item => {
    item.onclick = () => {
      selectedIndex = Number(item.dataset.index);
      renderSaved();
    };
  });

  renderPreview(savedPrompts[selectedIndex]);
}

document.getElementById('generateBtn').onclick = renderOutput;
document.getElementById('copyBtn').onclick = async () => {
  await navigator.clipboard.writeText(resultBox.textContent || '');
  showToast('정리본 복사 완료!');
};
document.getElementById('saveBtn').onclick = () => {
  const title = topicInput.value.trim();
  const ai = aiInput.value.trim();
  const use = useInput.value.trim();
  const tone = toneInput.value.trim();
  const detail = detailInput.value.trim();

  if(!title){
    showToast('제목을 입력하세요');
    return;
  }
  if(!ai){
    showToast('AI를 입력하세요');
    return;
  }
  if(!use){
    showToast('용도를 입력하세요');
    return;
  }

  const item = {
    title,
    ai,
    use,
    tone,
    detail,
    result: buildPrompt(title, ai, use, tone, detail)
  };

  if(editingIndex !== null && savedPrompts[editingIndex]){
    savedPrompts[editingIndex] = item;
    selectedIndex = editingIndex;
    editingIndex = null;
    showToast('수정 완료!');
  } else {
    savedPrompts.unshift(item);
    selectedIndex = 0;
    showToast('보관함에 저장됨');
  }

  refreshFilterOptions();
  renderSaved();
};
document.getElementById('resetBtn').onclick = () => {
  topicInput.value = '';
  aiInput.value = '';
  useInput.value = '';
  toneInput.value = '';
  detailInput.value = '';
  editingIndex = null;
  renderOutput();
};

document.querySelectorAll('.chip').forEach(chip => {
  chip.onclick = () => {
    const add = chip.dataset.add;
    detailInput.value = detailInput.value.trim() ? detailInput.value.trim() + ', ' + add : add;
    renderOutput();
  };
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    groupMode = tab.dataset.group;
    renderSaved();
  };
});

[topicInput, aiInput, useInput, toneInput, detailInput].forEach(el => {
  el.addEventListener('input', renderOutput);
});

searchInput.addEventListener('input', renderSaved);
aiFilter.addEventListener('change', renderSaved);
useFilter.addEventListener('change', renderSaved);

savedPrompts = savedPrompts.map(item => ({ ...item, result: buildPrompt(item.title, item.ai, item.use, item.tone, item.detail) }));
refreshFilterOptions();
renderOutput();
renderSaved();
</script>
</body>
</html>

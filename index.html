<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Archive</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family: Pretendard, sans-serif;
  background:#f3f4f6;
}

.container{
  display:flex;
  height:100vh;
}

/* 사이드 폴더 */
.sidebar{
  width:220px;
  background:#111827;
  color:white;
  padding:20px 12px;
}

.sidebar h2{
  font-size:16px;
  margin-bottom:16px;
}

.folder{
  padding:10px 12px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:6px;
}

.folder:hover{
  background:#1f2937;
}

.folder.active{
  background:#2563eb;
}

/* 메인 */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.topbar{
  padding:16px;
  border-bottom:1px solid #e5e7eb;
  background:white;
  display:flex;
  justify-content:space-between;
}

.content{
  display:flex;
  flex:1;
}

/* 프롬프트 리스트 */
.list{
  width:320px;
  border-right:1px solid #e5e7eb;
  background:#fafafa;
  overflow:auto;
}

.card{
  padding:14px;
  border-bottom:1px solid #e5e7eb;
  cursor:pointer;
}

.card:hover{
  background:#f0f9ff;
}

.card.active{
  background:#dbeafe;
}

.card h4{
  margin:0 0 6px;
  font-size:14px;
}

.card p{
  margin:0;
  font-size:12px;
  color:#6b7280;
}

/* 에디터 */
.editor{
  flex:1;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

input, textarea, select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #d1d5db;
}

textarea{
  height:200px;
}

.buttons{
  display:flex;
  gap:8px;
}

button{
  padding:10px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.primary{background:#2563eb;color:white}
.green{background:#16a34a;color:white}
.gray{background:#e5e7eb}

.result{
  background:#111827;
  color:white;
  padding:12px;
  border-radius:8px;
  white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="container">

  <!-- 폴더 영역 -->
  <div class="sidebar">
    <h2>폴더</h2>
    <div class="folder active" data-folder="all">전체</div>
    <div class="folder" data-folder="글쓰기">글쓰기</div>
    <div class="folder" data-folder="기획">기획</div>
    <div class="folder" data-folder="코딩">코딩</div>
  </div>

  <!-- 메인 영역 -->
  <div class="main">

    <div class="topbar">
      <div>Prompt Archive</div>
      <button class="green" id="addBtn">+ 새 프롬프트</button>
    </div>

    <div class="content">

      <!-- 리스트 -->
      <div class="list" id="list"></div>

      <!-- 에디터 -->
      <div class="editor">

        <input id="title" placeholder="제목">

        <select id="category">
          <option>글쓰기</option>
          <option>기획</option>
          <option>코딩</option>
        </select>

        <textarea id="text" placeholder="프롬프트 입력"></textarea>

        <div class="buttons">
          <button class="primary" id="improve">정리</button>
          <button class="green" id="save">저장</button>
          <button class="gray" id="copy">복사</button>
        </div>

        <div class="result" id="result"></div>

      </div>

    </div>

  </div>

</div>

<script>

let data = [
  {title:'발표문', category:'글쓰기', text:'발표문 써줘'},
  {title:'기획 구조', category:'기획', text:'기획 구조 정리해줘'},
  {title:'코드 생성', category:'코딩', text:'웹 코드 만들어줘'}
]

let currentIndex = null
let currentFolder = 'all'

const listEl = document.getElementById('list')
const titleEl = document.getElementById('title')
const textEl = document.getElementById('text')
const categoryEl = document.getElementById('category')
const resultEl = document.getElementById('result')

function render(){
  listEl.innerHTML=''

  data
    .filter(d => currentFolder==='all' || d.category===currentFolder)
    .forEach((item, i)=>{

    const div=document.createElement('div')
    div.className='card'
    if(i===currentIndex) div.classList.add('active')

    div.innerHTML=`
      <h4>${item.title}</h4>
      <p>${item.text}</p>
    `

    div.onclick=()=>{
      currentIndex=i
      titleEl.value=item.title
      textEl.value=item.text
      categoryEl.value=item.category
      render()
    }

    listEl.appendChild(div)
  })
}

function improve(text){
  return `요청을 더 구체적으로 작성하세요:\n${text}`
}

// 버튼
document.getElementById('improve').onclick=()=>{
  resultEl.textContent=improve(textEl.value)
}


document.getElementById('save').onclick=()=>{
  const newItem={
    title:titleEl.value,
    text:textEl.value,
    category:categoryEl.value
  }

  if(currentIndex!==null){
    data[currentIndex]=newItem
  }else{
    data.unshift(newItem)
  }

  currentIndex=null
  titleEl.value=''
  textEl.value=''
  render()
}


document.getElementById('copy').onclick=()=>{
  navigator.clipboard.writeText(textEl.value)
}


document.getElementById('addBtn').onclick=()=>{
  currentIndex=null
  titleEl.value=''
  textEl.value=''
}

// 폴더 선택
document.querySelectorAll('.folder').forEach(f=>{
  f.onclick=()=>{
    document.querySelectorAll('.folder').forEach(x=>x.classList.remove('active'))
    f.classList.add('active')
    currentFolder=f.dataset.folder
    render()
  }
})

render()

</script>

</body>
</html>
